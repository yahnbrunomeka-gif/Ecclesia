<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ecclesia">
<meta name="theme-color" content="#B8962E">
<meta name="description" content="Application communautaire pour les lieux de culte chrétiens">
<title>Ecclesia</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F4F0;color:#1C1A17;min-height:100vh}
:root{--gold:#B8962E;--gold-light:#F5EDD0;--surface:#fff;--surface2:#F5F4F0;--border:#E8E6E0;--text:#1C1A17;--muted:#6B6862}
.app{display:flex;flex-direction:column;height:100vh;max-width:1400px;margin:0 auto;background:#fff;box-shadow:0 0 40px rgba(0,0,0,.08)}
.hdr{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);background:#fff;flex-wrap:wrap}
.logo{width:36px;height:36px;border-radius:8px;background:#1C1A17;display:flex;align-items:center;justify-content:center;font-size:18px;color:#F5EDD0;flex-shrink:0}
.brand{font-size:20px;font-weight:700;letter-spacing:-.5px}.brand span{color:var(--gold)}
.tag{font-size:12px;color:var(--muted);margin-top:1px}
nav{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.nb{padding:6px 12px;border:none;background:none;cursor:pointer;font-size:12px;color:var(--muted);border-radius:8px;font-family:inherit;transition:all .15s;white-space:nowrap}
.nb:hover{background:var(--surface2);color:var(--text)}.nb.on{background:var(--gold-light);color:#7A6010;font-weight:600}
.nb.adm{background:#1C1A17;color:#F5EDD0}.nb.adm.on{background:#B8962E;color:#fff}
.main{display:flex;flex:1;overflow:hidden}
.side{width:300px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:#fff;overflow:hidden}
.srch{padding:12px;border-bottom:1px solid var(--border)}
.srch input{width:100%;padding:9px 13px;font-size:13px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-family:inherit}
.srch input:focus{outline:none;border-color:var(--gold)}
.fltrs{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap}
.fchip{padding:5px 11px;font-size:11px;border-radius:20px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--muted);font-family:inherit;transition:all .15s}
.fchip.on{background:#1C1A17;color:#F5EDD0;border-color:#1C1A17}
.lst{flex:1;overflow-y:auto}
.citem{padding:13px 15px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.citem:hover{background:var(--surface2)}.citem.on{background:var(--gold-light);border-left:3px solid var(--gold)}
.cname{font-size:13px;font-weight:600}.csub{font-size:11px;color:var(--muted);margin-top:2px}
.cbadges{display:flex;gap:5px;margin-top:7px;align-items:center;flex-wrap:wrap}
.bdg{padding:2px 7px;border-radius:4px;font-size:10px;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.bdg.v{background:#EAF3DE;color:#3B6D11;border-color:#C0DD97}
.bdg.a{background:#E1F5EE;color:#0F6E56;border-color:#9FE1CB}
.strs{font-size:11px;color:var(--gold)}
.cnt{flex:1;overflow-y:auto;background:#fff}
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%;z-index:1}
.det{padding:24px}
.cov{height:200px;border-radius:14px;margin-bottom:20px;display:flex;align-items:flex-end;padding:18px;position:relative;overflow:hidden;background-size:cover;background-position:center}
.covbg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.45)}
.covin{position:relative;z-index:1}
.ctitle{font-size:22px;font-weight:700}.cdenom{font-size:13px;opacity:.8;margin-top:4px}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.mcard{background:var(--surface2);border-radius:8px;padding:13px;border:1px solid var(--border)}
.mlbl{font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.mval{font-size:14px;font-weight:600}
.stitle{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;margin-top:22px}
.sitem{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:9px;border:1px solid var(--border);margin-bottom:7px}
.sday{width:38px;height:38px;border-radius:8px;background:#1C1A17;color:#F5EDD0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;text-align:center;flex-shrink:0}
.tybdg{padding:3px 9px;border-radius:4px;font-size:10px;background:var(--gold-light);color:#7A6010}
.mitem{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:9px;border:1px solid var(--border);margin-bottom:7px}
.nitem{display:flex;align-items:center;gap:11px;padding:9px 13px;border-radius:9px;border:1px solid var(--border);margin-bottom:7px}
.fbtn{padding:7px 16px;border-radius:8px;cursor:pointer;font-size:12px;border:1px solid var(--border);background:#fff;color:var(--text);font-family:inherit;transition:all .15s;margin-left:auto;position:relative;z-index:1;font-weight:500}
.fbtn.on{background:#FAEEDA;color:#854F0B;border-color:#FAC775}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:14px;font-size:14px;padding:60px}
.langbar{display:flex;gap:6px;padding:10px 15px;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--surface2)}
.lchip{padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--muted);white-space:nowrap;font-family:inherit;flex-shrink:0;transition:all .15s}
.lchip.on{background:#1C1A17;color:#F5EDD0;border-color:#1C1A17}
.ldot{width:7px;height:7px;border-radius:50%;background:#1D9E75;display:inline-block;margin-right:4px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px}
.bcard{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.pcrd{background:#fff;border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:14px}
.back-btn{display:none;margin:10px 12px}
.mob-toggle{display:none;position:fixed;bottom:20px;right:20px;z-index:999;width:48px;height:48px;border-radius:50%;background:#1C1A17;color:#F5EDD0;font-size:20px;border:none;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2);align-items:center;justify-content:center}
.fav-count,.mem-count{background:var(--gold);color:#fff;font-size:10px;padding:1px 5px;border-radius:10px;margin-left:4px}
.btn{padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;border:1px solid var(--border);background:#fff;color:var(--text);font-family:inherit;transition:all .15s;font-weight:500}
.btn:hover{background:var(--surface2)}.btn-gold{background:var(--gold);color:#fff;border-color:var(--gold)}.btn-gold:hover{background:#9A7D24}
.btn-red{background:#C0392B;color:#fff;border-color:#C0392B}.btn-red:hover{background:#962D22}
.btn-sm{padding:5px 12px;font-size:11px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--gold)}
.fg textarea{min-height:80px;resize:vertical}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.adm-section{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px}
.adm-section h3{font-size:15px;font-weight:700;margin-bottom:12px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 10px;background:var(--surface2);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border)}
.tbl tr:hover td{background:var(--surface2)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:14px;padding:24px;max-width:600px;width:92%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px}
.modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:4px}
.login-box{max-width:380px;margin:60px auto;text-align:center}
.login-box h2{font-size:20px;margin-bottom:8px}.login-box p{font-size:13px;color:var(--muted);margin-bottom:20px}
.login-box .fg{text-align:left}
.login-box .btn{width:100%;padding:11px;font-size:14px;font-weight:600}
.err-msg{background:#FAEAEA;color:#C0392B;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:12px;display:none}
.ok-msg{background:#EAF3DE;color:#3B6D11;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:12px;display:none}
.tag-b{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.leader-card{display:flex;align-items:center;gap:12px;padding:10px 13px;border-radius:9px;border:1px solid var(--border);margin-bottom:7px}
.lavatar{width:42px;height:42px;border-radius:50%;background:#1C1A17;color:#F5EDD0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.history-box{background:var(--surface2);border-radius:12px;padding:18px;border:1px solid var(--border);margin-top:16px;line-height:1.8;font-size:14px;color:#6B6862}
.img-gallery{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.img-card{border-radius:12px;overflow:hidden;border:1px solid var(--border);position:relative;height:180px}
.img-card img{width:100%;height:100%;object-fit:cover}
.img-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);color:#fff;font-size:11px;padding:6px 10px;font-weight:600}
.contact-row{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13px}
.contact-row .ic{width:28px;height:28px;border-radius:6px;background:var(--gold-light);color:#7A6010;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.msg-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px}
.msg-card .mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.msg-card .ma{font-size:11px;color:var(--muted)}
.msg-card .mt{font-size:13px;color:#6B6862;line-height:1.6}
.grp-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.grp-card:hover{border-color:var(--gold)}
.grp-card .gh{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.grp-card .gi{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.grp-badge{padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600}
.chat-box{border:1px solid var(--border);border-radius:12px;overflow:hidden;max-height:400px;display:flex;flex-direction:column}
.chat-msgs{flex:1;overflow-y:auto;padding:14px}
.chat-bubble{max-width:75%;padding:8px 12px;border-radius:12px;margin-bottom:8px;font-size:13px}
.chat-bubble.me{background:var(--gold-light);margin-left:auto;border-bottom-right-radius:4px}
.chat-bubble.other{background:var(--surface2);margin-right:auto;border-bottom-left-radius:4px}
.chat-bubble .cb-name{font-size:10px;font-weight:600;color:var(--muted);margin-bottom:2px}
.chat-input{display:flex;gap:8px;padding:10px;border-top:1px solid var(--border)}
.chat-input input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit}
.chat-input input:focus{outline:none;border-color:var(--gold)}
.tab-bar{display:flex;gap:4px;border-bottom:1px solid var(--border);padding-bottom:0;margin-bottom:16px}
.tab-btn{padding:8px 16px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;font-family:inherit;transition:all .15s}
.tab-btn.on{color:var(--text);border-bottom-color:var(--gold);font-weight:600}
@media(max-width:768px){
  .side{position:fixed;top:0;left:0;width:100%;height:100%;z-index:900;transform:translateX(-100%);transition:transform .3s ease}
  .side.open{transform:translateX(0)}
  .mob-toggle{display:flex}
  .main{flex-direction:column}
  .map-wrap{min-height:50vh}
  .cnt{min-height:50vh}
  .det{padding:16px}
  .cov{height:160px}
  .ctitle{font-size:18px}
  .meta{grid-template-columns:1fr}
  .hdr{padding:10px 14px;gap:8px}
  .brand{font-size:18px}
  .nb{padding:6px 10px;font-size:11px}
  .back-btn{display:inline-flex}
  .grid{grid-template-columns:1fr 1fr}
  .app{max-width:100vw}
  #map{min-height:60vh}
  .frow{grid-template-columns:1fr}
  .tbl{font-size:11px}
  .tbl th,.tbl td{padding:5px 6px}
  .img-gallery{grid-template-columns:1fr}
  .img-card{height:160px}
}
@media(max-width:480px){
  .grid{grid-template-columns:1fr}
  .fltrs{gap:4px}
  .fchip{font-size:10px;padding:4px 8px}
}
</style>
</head>

<script>
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./service-worker.js').catch(()=>{})})}
let deferredPrompt;window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredPrompt=e;const btn=document.getElementById('installBtn');if(btn)btn.style.display='inline-block';const banner=document.getElementById('installBanner');if(banner)banner.style.display='block'});
window.addEventListener('appinstalled',()=>{const btn=document.getElementById('installBtn');if(btn)btn.style.display='none';const banner=document.getElementById('installBanner');if(banner)banner.style.display='none';deferredPrompt=null});
function installApp(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null})}

brevOpening:{fr:"Dieu, viens à mon aide !",en:"God, come to my assistance.",es:"Dios, ven en mi ayuda.",pt:"Deus, vinde em meu auxílio.",ar:"اللهم، إلى مساعدتي بادِر.",zh:"天主，求你快来拯救我。",de:"Gott, komm mir zu Hilfe.",ru:"Боже, приди мне на помощь.",ja:"神よ、来てわたしを救ってください。",hi:"हे परमेश्वर, मेरी सहायता करो।",it:"O Dio, vieni a salvarmi.",bn:"ঈশ্বর, আমার সাহায্যে এসো।",ko:"하느님, 나를 구하러 오소서.",id:"Ya Allah, datanglah untuk menolong aku.",tr:"Ey Tanrı, imdadıma yetiş.",vi:"Lạy Thiên Chúa, xin ngự lại giúp con.",th:"ข้าแต่พระเจ้า โปรดมาช่วยข้าพเจ้าด้วย",pl:"Boże, weź mnie pod opiekę.",nl:"God, kom mij te hulp.",ro:"Dumnezeule, vino în ajutorul meu."},
brevResponse:{fr:"Seigneur, à notre aide !",en:"Lord, make haste to help me.",es:"Señor, date prisa en socorrerme.",pt:"Senhor, apressai-vos em socorrer-me.",ar:"يا رب، إلى النجدة أسرع.",zh:"上主，求你速来扶助我。",de:"Herr, eile mir zu helfen.",ru:"Господи, поспеши мне на помощь.",ja:"主よ、急いでわたしを助けてください。",hi:"हे प्रभु, जल्दी मेरी मदद करो।",it:"Signore, vieni presto in mio aiuto.",bn:"প্রভু, আমাকে সাহায্য করতে তাড়াতাড়ি করো।",ko:"주님, 어서 오시어 나를 도우소서.",id:"Tuhan, segeralah membantu aku.",tr:"Rab, yardım etmeye acele et.",vi:"Muôn lạy Chúa, xin mau phù trợ.",th:"ข้าแต่องค์พระผู้เป็นเจ้า โปรดเร่งมาช่วยข้าพเจ้าด้วย",pl:"Panie, ratuj mnie.",nl:"Heer, haast U mij te helpen.",ro:"Doamne, grăbește-Te să mă ajuți."},
brevGlory:{fr:"Gloire au Père, et au Fils, et au Saint-Esprit, au Dieu qui est, qui était et qui vient, pour les siècles des siècles. Amen.",en:"Glory to the Father, and to the Son, and to the Holy Spirit, to God who is, who was and who is to come, for ever and ever. Amen.",es:"Gloria al Padre, y al Hijo, y al Espíritu Santo, al Dios que es, que era y que ha de venir, por los siglos de los siglos. Amén.",pt:"Glória ao Pai, e ao Filho, e ao Espírito Santo, ao Deus que é, que era e que há de vir, pelos séculos dos séculos. Amém.",ar:"المجد للآب والابن والروح القدس، للإله الكائن الذي كان ويكون إلى الأبد. آمين.",zh:"愿光荣归于父、及子、及圣神，那今在、昔在、及以后再来之天主，直到永远。阿们。",de:"Ehre dem Vater und dem Sohn und dem Heiligen Geist, dem Gott, der ist, der war und der kommt, von Ewigkeit zu Ewigkeit. Amen.",ru:"Слава Отцу, и Сыну, и Святому Духу, Богу, Который есть, был и грядет, во веки веков. Аминь.",ja:"父と子と聖霊に栄光あれ、今もいつも世々に。アーメン。",hi:"पिता और पुत्र और पवित्र आत्मा की महिमा हो, परमेश्वर की जो है, था और आएगा, सदा के लिए। आमेन।",it:"Gloria al Padre, e al Figlio, e allo Spirito Santo, a Dio che è, che era e che viene, nei secoli dei secoli. Amen.",bn:"পিতা এবং পুত্র এবং পবিত্র আত্মার মহিমা, যিনি আছেন, ছিলেন এবং আসবেন, চিরকালের জন্য। আমেন।",ko:"아버지와 아들과 성령께 영광을, 지금도 항상 영원히. 아멘.",id:"Kemuliaan kepada Bapa, dan Putra, dan Roh Kudus, kepada Allah yang ada, yang dahulu ada, dan yang akan datang, selama-lamanya. Amin.",tr:"Baba'ya, Oğul'a ve Kutsal Ruh'a glory, var olan, var olmuş ve gelecek olan Tanrı'ya sonsuzlara dek. Amin.",vi:"Sáng Danh Đức Chúa Cha, và Đức Chúa Con, và Đức Chúa Thánh Thần, cùng Thiên Chúa hằng hữu, đã có và sẽ đến, muôn đời. Amen.",th:"พระสิริจงมีแด่พระบิดา และพระบุตร และพระจิตศักดิ์สิทธิ์ แด่พระเจ้าผู้ทรงดำรงอยู่ เดี๋ยวนี้และตลอดไป อาแมน",pl:"Chwała Ojcu i Synowi, i Duchowi Świętemu, Bogu który jest, który był i który przyjdzie, na wieki wieków. Amen.",nl:"Eer aan de Vader en de Zoon en de Heilige Geest, aan God die is, die was en die komt, tot in alle eeuwigheid. Amen.",ro:"Slavă Tatălui, și Fiului, și Sfântului Duh, Dumnezeului care este, care era și care va veni, în vecii vecilor. Amin."},

function buildNav(){
  const nav=document.getElementById('mainNav');
  const navItems=[{id:'navWelcome'},{v:'map',k:'navMap'},{v:'media',k:'navMedia'},{v:'prayers',k:'navPrayers'},{v:'breviary',k:'navBreviary'},{v:'books',k:'navBooks'},{v:'community',k:'navCommunity'},{v:'groups',k:'navGroups'},{v:'register',k:'navRegister'},{v:'churchreg',k:'navChurchReg'},{id:'navAccount'},{v:'admin',k:'navAdmin',adm:true}];
  nav.innerHTML=navItems.map((n,i)=>{
    if(n.id==='navWelcome')return`<button class="nb" id="${n.id}" onclick="sv('welcome')" title="Accueil">🏠</button>`;
    if(n.id)return`<button class="nb" id="${n.id}" onclick="navAccount()"></button>`;
    return`<button class="nb${n.adm?' adm':''}" onclick="sv('${n.v}')" data-i18n="${n.k}"></button>`;
  }).join('');
  document.getElementById('langWrap').innerHTML=`<select id="langSel" onchange="setLang(this.value)" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;background:var(--surface2);cursor:pointer;font-family:inherit">${LS.map(l=>`<option value="${l}" ${l===cl?'selected':''}>${LL[l]}</option>`).join('')}</select>`;
}

  {id:3,name:"Sainte-Sophie d'Istanbul",den:'Orthodoxe',city:'Istanbul',co:'TR',rt:4.7,rv:43120,cap:10000,yr:537,v:true,bg:'#3C3489',tc:'#EEEDFE',lat:41.0086,lng:28.9802,adr:'Sultanahmet Meydanı 1, Istanbul',desc:{fr:"Ancienne basilique byzantine, chef-d'œuvre de l'architecture mondiale.",en:'Former Byzantine basilica, a masterpiece of world architecture.'},sch:[{d:'Vendredi',t:'13:00',ty:'Prière',l:'tr',r:'Hebdomadaire'},{d:'Lun-Dim',t:'09:00',ty:'Visite',l:'tr',r:'Quotidien'}],med:[],nb:[],leaders:[{nom:'Patriarche Bartholomée Ier',role:'Patriarche œcuménique'}],phone:'+90 212 522 1750',email:'',website:'',imgExt:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Hagia_Sophia_B12-42.jpg/640px-Hagia_Sophia_B12-42.jpg',imgInt:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Haghia_Sophonia_Interior.jpg/640px-Haghia_Sophonia_Interior.jpg',history:"Sainte-Sophie (Hagia Sophia) est un édifice exceptionnel construit en 537 sur ordre de l'empereur byzantin Justinien Ier. Pendant près de mille ans, elle fut la plus grande cathédrale du monde chrétien. Son dôme monumental de 31 mètres de diamètre a révolutionné l'architecture. Convertie en mosquée après la conquête ottomane de 1453, puis en musée par Atatürk en 1935, elle est redevenue mosquée en 2020. Ses mosaïques byzantines et son architecture unique en font l'un des monuments les plus admirés de l'histoire humaine."},
  {id:4,name:'Église Évangélique de Paris',den:'Évangélique',city:'Paris',co:'FR',rt:4.6,rv:890,cap:500,yr:1872,v:true,bg:'#0F6E56',tc:'#E1F5EE',lat:48.8646,lng:2.3675,adr:'14 Rue Crussol, Paris 11e',desc:{fr:'Communauté évangélique dynamique au cœur de Paris, avec un ministère de louange contemporain.',en:'A vibrant evangelical community in central Paris.'},sch:[{d:'Dimanche',t:'10:30',ty:'Culte',l:'fr',r:'Hebdomadaire'},{d:'Dimanche',t:'18:00',ty:'Culte du soir',l:'fr',r:'Hebdomadaire'},{d:'Mercredi',t:'19:30',ty:'Étude biblique',l:'fr',r:'Hebdomadaire'},{d:'Vendredi',t:'20:00',ty:'Soirée de louange',l:'fr',r:'Hebdomadaire'}],med:[{tp:'podcast',n:'Podcast EEP',lv:false}],nb:[],leaders:[{nom:'Pasteur Jean Dupont',role:'Pasteur principal'},{nom:'Pasteure Marie Dupont',role:'Co-pasteure'}],phone:'+33 1 43 55 72 19',email:'contact@eeparis.fr',website:'https://www.eeparis.fr',imgExt:'',imgInt:'',history:"Fondée en 1872, l'Église Évangélique de Paris est l'une des plus anciennes communautés protestantes évangéliques de la capitale. Située dans le 11e arrondissement, elle rassemble une communauté multiculturelle de plusieurs centaines de fidèles. Connue pour sa louange contemporaine et son engagement social, elle propose des programmes pour les jeunes, les familles et les personnes en situation de précarité."},
  {id:5,name:'Cathédrale Saint-Alexandre-Nevski',den:'Orthodoxe',city:'Paris',co:'FR',rt:4.5,rv:2340,cap:800,yr:1861,v:false,bg:'#3C3489',tc:'#EEEDFE',lat:48.8763,lng:2.3132,adr:'12 Rue Daru, Paris 8e',desc:{fr:'Cathédrale orthodoxe russe avec de magnifiques bulbes dorés, joyau de Paris.',ru:'Русский православный собор с золотыми куполами в Париже.'},sch:[{d:'Dimanche',t:'09:00',ty:'Divine Liturgie',l:'ru',r:'Hebdomadaire'},{d:'Dimanche',t:'10:30',ty:'Divine Liturgie (français)',l:'fr',r:'Hebdomadaire'},{d:'Samedi',t:'18:00',ty:'Vêpres',l:'ru',r:'Hebdomadaire'}],med:[],nb:[],leaders:[{nom:'Métropolite Jean',role:'Archevêque'}],phone:'+33 1 42 27 08 45',email:'',website:'',imgExt:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Cath%C3%A9drale_Saint-Alexandre-Nevsky_de_Paris.jpg/640px-Cath%C3%A9drale_Saint-Alexandre-Nevsky_de_Paris.jpg',imgInt:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Int%C3%A9rieur_de_la_cath%C3%A9drale_Saint-Alexandre-Nevsky_%28Paris%29.jpg/640px-Int%C3%A9rieur_de_la_cath%C3%A9drale_Saint-Alexandre-Nevsky_%28Paris%29.jpg',history:"La cathédrale Saint-Alexandre-Nevski a été construite entre 1859 et 1861 grâce à une souscription de la communauté russe de Paris. Premier édifice religieux orthodoxe russe en France, elle est le centre spirituel de la communauté orthodoxe russe parisienne. Ses bulbes dorés et son architecture néo-russe en font un monument remarquable du 8e arrondissement. L'intérieur est orné d'icônes magnifiques et d'une iconostase sculptée."},
  {id:6,name:"Église Protestante de l'Oratoire du Louvre",den:'Protestante',city:'Paris',co:'FR',rt:4.4,rv:1560,cap:1200,yr:1606,v:true,bg:'#085041',tc:'#E1F5EE',lat:48.8611,lng:2.3364,adr:'145 Rue Saint-Honoré, Paris 1er',desc:{fr:'Temple protestant historique au cœur de Paris, face au Palais Royal.',en:'Historic Protestant temple in the heart of Paris, facing the Palais Royal.'},sch:[{d:'Dimanche',t:'10:30',ty:'Culte',l:'fr',r:'Hebdomadaire'},{d:'Dimanche',t:'18:30',ty:'Culte du soir',l:'fr',r:'Hebdomadaire'},{d:'Mercredi',t:'12:30',ty:'Culte du midi',l:'fr',r:'Hebdomadaire'}],med:[],nb:[],leaders:[{nom:'Pasteur Emmanuel Goffi',role:'Pasteur titulaire'}],phone:'+33 1 42 86 27 45',email:'contact@oratoiredulouvre.fr',website:'https://www.oratoiredulouvre.fr',imgExt:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Temple_de_l%27Oratoire_du_Louvre_-_vue_de_la_Rue_Saint-Honor%C3%A9.jpg/640px-Temple_de_l%27Oratoire_du_Louvre_-_vue_de_la_Rue_Saint-Honor%C3%A9.jpg',imgInt:'',history:"L'Oratoire du Louvre est le plus ancien temple protestant de Paris. Sa construction a commencé en 1606 pour les pères de l'Oratoire fondés par le cardinal de Bérulle. Le temple est devenu protestant en 1811 sous Napoléon Ier. Situé face au Palais Royal, il est le siège de la paroisse protestante unie du Louvre. Son architecture classique et son orgue prestigieux en font un lieu de culte et de concerts remarquable."},
  {id:7,name:'Sacre-Cœur de Montmartre',den:'Catholique',city:'Paris',co:'FR',rt:4.7,rv:67200,cap:6000,yr:1914,v:true,bg:'#E8E4DC',tc:'#1C1A17',lat:48.8867,lng:2.3431,adr:'35 Rue du Chevalier de la Barre, Paris 18e',desc:{fr:'Basilique au sommet de Montmartre, offrant un panorama unique sur Paris.',en:'Basilica atop Montmartre hill with stunning panoramic views of Paris.'},sch:[{d:'Dimanche',t:'08:00',ty:'Messe',l:'fr',r:'Hebdomadaire'},{d:'Dimanche',t:'10:00',ty:'Messe solennelle',l:'fr',r:'Hebdomadaire'},{d:'Dimanche',t:'18:00',ty:'Messe du soir',l:'fr',r:'Hebdomadaire'},{d:'Lun-Sam',t:'07:00',ty:'Messe matinale',l:'fr',r:'Quotidien'},{d:'Lun-Sam',t:'08:30',ty:'Messe',l:'fr',r:'Quotidien'}],med:[],nb:[],leaders:[{nom:'Père Jean-Marc Fournier',role:'Recteur'}],phone:'+33 1 53 41 89 00',email:'',website:'https://www.sacre-coeur-montmartre.com',imgExt:'https://upload.wikimedia.org/wikipedia/commons/thumb/d/de/Basilique_du_Sacr%C3%A9-C%C5%93ur_de_Montmartre_-_Paris_-_2014.jpg/640px-Basilique_du_Sacr%C3%A9-C%C5%93ur_de_Montmartre_-_Paris_-_2014.jpg',imgInt:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Sacre_Coeur_Paris_Interior.jpg/640px-Sacre_Coeur_Paris_Interior.jpg',history:"La basilique du Sacré-Cœur est l'un des monuments les plus emblématiques de Paris. Construite entre 1875 et 1914 au sommet de la butte Montmartre, elle a été édifiée en expiation des souffrances de la guerre franco-prussienne et de la Commune de Paris. Son architecture romano-byzantine, avec son dôme culminant à 83 mètres, est unique à Paris. L'adoration eucharistique y est permanente depuis 1885. Le parvis offre l'un des plus beaux panoramas sur la capitale."},
  {id:8,name:'Cathédrale de Westminster',den:'Catholique',city:'Londres',co:'GB',rt:4.5,rv:5420,cap:2000,yr:1903,v:true,bg:'#8B1A1A',tc:'#FAEAEA',lat:51.4957,lng:-0.1395,adr:'42 Francis Street, London SW1P',desc:{fr:'Cathédrale catholique néo-byzantine de Londres, siège de l\'archevêque de Westminster.',en:'Neo-Byzantine Catholic cathedral in London, seat of the Archbishop of Westminster.'},sch:[{d:'Dimanche',t:'11:00',ty:'Messe solennelle',l:'en',r:'Hebdomadaire'},{d:'Dimanche',t:'08:00',ty:'Messe',l:'en',r:'Hebdomadaire'},{d:'Samedi',t:'10:00',ty:'Messe',l:'en',r:'Hebdomadaire'},{d:'Lun-Ven',t:'07:00',ty:'Messe',l:'en',r:'Quotidien'}],med:[],nb:[],leaders:[{nom:'Card. Vincent Nichols',role:'Archevêque de Westminster'}],phone:'+44 20 7798 9050',email:'',website:'https://westminstercathedral.org.uk',imgExt:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/36/Westminster_Cathedral_from_above.jpg/640px-Westminster_Cathedral_from_above.jpg',imgInt:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Westminster_Cathedral_interior.jpg/640px-Westminster_Cathedral_interior.jpg',history:"La cathédrale de Westminster, consacrée en 1903, est la principale église catholique d'Angleterre. De style néo-byzantin, elle se distingue par ses mosaïques dorées spectaculaires et son campanile de 83 mètres. Siège de l'archevêque de Westminster, elle est le centre de l'Église catholique en Angleterre et au Pays de Galles. Son intérieur richement décoré contraste avec la simplicité de sa façade en briques rouges."},
  {id:9,name:'Cathédrale Saint-Paul',den:'Protestante',city:'Londres',co:'GB',rt:4.7,rv:34800,cap:5000,yr:1710,v:true,bg:'#2D2D2D',tc:'#E8E8E8',lat:51.5138,lng:-0.0984,adr:"St. Paul's Churchyard, London EC4M",desc:{fr:'Chef-d\'œuvre de Christopher Wren, symbole de la résistance londonienne.',en:'Masterpiece by Christopher Wren, a symbol of London\'s resilience.'},sch:[{d:'Dimanche',t:'10:30',ty:'Culte',l:'en',r:'Hebdomadaire'},{d:'Dimanche',t:'11:00',ty:'Choral Evensong',l:'en',r:'Hebdomadaire'},{d:'Mercredi',t:'12:30',ty:'Culte du midi',l:'en',r:'Hebdomadaire'}],med:[],nb:[],leaders:[{nom:'Rév. Andrew Tremlett',role:'Doyen de St. Paul\'s'}],phone:'+44 20 7246 8350',email:'',website:'https://stpaulscathedral.org.uk',imgExt:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/St_Paul%27s_Cathedral_exterior_%2834338330931%29.jpg/640px-St_Paul%27s_Cathedral_exterior_%2834338330931%29.jpg',imgInt:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/St_Paul%27s_Cathedral_Nave.jpg/640px-St_Paul%27s_Cathedral_Nave.jpg',history:"La cathédrale Saint-Paul est l'œuvre magistrale de Sir Christopher Wren, construite après le grand incendie de Londres de 1666. Achevée en 1710, elle a dominé le skyline londonien pendant plus de 250 ans. Son dôme emblématique de 111 mètres a survécu aux bombardements de la Seconde Guerre mondiale, devenant le symbole de la résistance britannique. Elle a accueilli le mariage du Prince Charles et de Lady Diana en 1981. Sa galerie des chuchotements et son magnifique intérieur baroque en font un trésor architectural."},
  {id:10,name:'Cathédrale de Cologne',den:'Catholique',city:'Cologne',co:'DE',rt:4.8,rv:52100,cap:8000,yr:1880,v:true,bg:'#3A3A3A',tc:'#E8E6E0',lat:50.9413,lng:6.9583,adr:'Domkloster 4, 50667 Köln',desc:{fr:'Cathédrale gothique classée au patrimoine mondial de l\'UNESCO, joyau de Cologne.',en:'Gothic cathedral and UNESCO World Heritage Site, the jewel of Cologne.'},sch:[{d:'Dimanche',t:'10:00',ty:'Messe solennelle',l:'de',r:'Hebdomadaire'},{d:'Dimanche',t:'08:00',ty:'Messe',l:'de',r:'Hebdomadaire'},{d:'Samedi',t:'17:00',ty:'Messe vespérale',l:'de',r:'Hebdomadaire'},{d:'Lun-Sam',t:'06:40',ty:'Messe matinale',l:'de',r:'Quotidien'}],med:[],nb:[],leaders:[{nom:'Card. Rainer Maria Woelki',role:'Archevêque de Cologne'}],phone:'+49 221 17940',email:'',website:'https://www.koelner-dom.de',imgExt:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/Cologne_Cathedral_South_Elevation.jpg/640px-Cologne_Cathedral_South_Elevation.jpg',imgInt:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/K%C3%B6lner_Dom_Innenraum.jpg/640px-K%C3%B6lner_Dom_Innenraum.jpg',history:"Le Dom de Cologne est l'une des cathédrales gothiques les plus imposantes du monde. Sa construction a commencé en 1248 pour abriter les reliques des Rois Mages, mais ne s'est achevée qu'en 1880 après six siècles d'interruption. Ses deux tours de 157 mètres en font la troisième plus haute église du monde. Classée au patrimoine mondial de l'UNESCO, elle abrite le reliquaire des Rois Mages, chef-d'œuvre d'orfèvrerie médiévale, et ses vitraux modernes (dont celui de Gerhard Richter) créent un dialogue unique entre art médiéval et contemporain."},
  {id:11,name:'Cathédrale Saint-Basile',den:'Orthodoxe',city:'Moscou',co:'RU',rt:4.8,rv:71300,cap:3000,yr:1561,v:true,bg:'#C0392B',tc:'#FAEAEA',lat:55.7525,lng:37.6231,adr:'Red Square, Moscow 109012',desc:{fr:'Cathédrale orthodoxe aux bulbes colorés, emblème de la Russie sur la Place Rouge.',ru:'Православный собор с разноцветными куполами, символ России на Красной площади.'},sch:[{d:'Dimanche',t:'10:00',ty:'Divine Liturgie',l:'ru',r:'Hebdomadaire'},{d:'Samedi',t:'17:00',ty:'Vêpres',l:'ru',r:'Hebdomadaire'}],med:[],nb:[],leaders:[{nom:'Père Alexandre',role:'Prêtre titulaire'}],phone:'+7 495 698-33-04',email:'',website:'',imgExt:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/73/Saint_Basil%27s_Cathedral_2024.jpg/640px-Saint_Basil%27s_Cathedral_2024.jpg',imgInt:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Saint_Basil%27s_Cathedral_interior.jpg/640px-Saint_Basil%27s_Cathedral_interior.jpg',history:"La cathédrale Saint-Basile-le-Bienheureux a été construite entre 1555 et 1561 sur ordre d'Ivan le Terrible pour commémorer la prise de Kazan. Ses neuf chapelles aux bulbes colorés et torsadés en font le monument le plus emblématique de la Russie. Située sur la Place Rouge, elle a survécu à de nombreuses tentatives de destruction, notamment sous Staline qui voulait la raser pour agrandir la place. Transformée en musée pendant l'ère soviétique, elle est redevenue un lieu de culte orthodoxe en 1991. Chaque bulbe raconte une histoire différente et l'intérieur abrite des icônes d'une beauté saisissante."},
  {id:12,name:'Église de la Madeleine',den:'Catholique',city:'Paris',co:'FR',rt:4.5,rv:7820,cap:1500,yr:1842,v:true,bg:'#D4C9A8',tc:'#2C2C2A',lat:48.8699,lng:2.3250,adr:'14 Rue de Surène, Paris 8e',desc:{fr:'Église néo-classique inspirée d\'un temple romain, au cœur du 8e arrondissement.',en:'Neoclassical church inspired by a Roman temple, in the heart of the 8th arrondissement.'},sch:[{d:'Dimanche',t:'10:30',ty:'Messe solennelle',l:'fr',r:'Hebdomadaire'},{d:'Dimanche',t:'18:30',ty:'Messe du soir',l:'fr',r:'Hebdomadaire'},{d:'Lun-Ven',t:'12:00',ty:'Messe',l:'fr',r:'Quotidien'},{d:'Lun-Sam',t:'08:00',ty:'Messe matinale',l:'fr',r:'Quotidien'}],med:[],nb:[],leaders:[{nom:'Père Jean-Paul',role:'Curé'}],phone:'+33 1 44 51 88 87',email:'',website:'https://www.eglise-lamadeleine.com',imgExt:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/32/%C3%89glise_de_la_Madeleine_Paris.jpg/640px-%C3%89glise_de_la_Madeleine_Paris.jpg',imgInt:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/La_Madeleine_interieur.jpg/640px-La_Madeleine_interieur.jpg',history:"L'église de la Madeleine est un édifice néo-classique unique à Paris, inspiré de la Maison Carrée de Nîmes. Sa construction a débuté en 1764 et s'est achevée en 1842 après de multiples interruptions. Ses 52 colonnes corinthiennes et son fronton sculpté évoquent un temple grec antique. L'intérieur abrite un grand orgue célèbre (Cavaillé-Coll) et des fresques remarquables. Le mariage de Chopin et George Sand devait y avoir lieu, et les funérailles de Victor Hugo, Chopin et Fauré y furent célébrées."},
  {id:13,name:'Cathédrale de Barcelone',den:'Catholique',city:'Barcelone',co:'ES',rt:4.6,rv:28900,cap:3000,yr:1329,v:true,bg:'#5D4E37',tc:'#FAECE7',lat:41.3840,lng:2.1764,adr:'Pla de la Seu, 3, 08002 Barcelona',desc:{fr:'Cathédrale gothique dédiée à Sainte Eulalie, au cœur du quartier gothique de Barcelone.',es:'Catedral gótica dedicada a Santa Eulalia, en el corazón del barrio gótico de Barcelona.'},sch:[{d:'Dimanche',t:'11:00',ty:'Messe solennelle',l:'ca',r:'Hebdomadaire'},{d:'Dimanche',t:'09:00',ty:'Messe',l:'es',r:'Hebdomadaire'},{d:'Samedi',t:'18:00',ty:'Vêpres',l:'ca',r:'Hebdomadaire'},{d:'Lun-Sam',t:'08:30',ty:'Messe',l:'es',r:'Quotidien'}],med:[],nb:[],leaders:[{nom:'Card. Juan José Omella',role:'Archevêque de Barcelone'}],phone:'+34 933 42 82 62',email:'',website:'https://www.catedralbcn.org',imgExt:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/74/Barcelona_Cathedral_Exterior.jpg/640px-Barcelona_Cathedral_Exterior.jpg',imgInt:'https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Interior_de_la_Catedral_de_Barcelona.jpg/640px-Interior_de_la_Catedral_de_Barcelona.jpg',history:"La cathédrale de la Sainte-Croix et Sainte-Eulalie de Barcelone est le principal édifice gothique de la ville. Sa construction s'est étendue du XIIIe au XVe siècle sur l'emplacement d'une ancienne cathédrale romane. Dédiée à Sainte Eulalie, martyre barcelonaise du IVe siècle, elle abrite ses reliques dans la crypte. Son cloître, avec ses 13 oies blanches (symbole des 13 ans de la sainte), est l'un des plus beaux de Catalogne. La façade néo-gothique a été achevée au XIXe siècle."},
  {id:14,name:'Église Évangélique FIM',den:'Évangélique',city:'Kinshasa',co:'CD',rt:4.7,rv:15200,cap:20000,yr:2004,v:true,bg:'#1B4F72',tc:'#E8F0FE',lat:-4.3249,lng:15.3134,adr:'1302 Avenue des Forces Armées, Kinshasa',desc:{fr:'L\'une des plus grandes églises évangéliques d\'Afrique centrale, avec une communauté dynamique de plus de 20 000 fidèles.',en:'One of the largest evangelical churches in Central Africa, with a vibrant community of over 20,000 members.'},sch:[{d:'Dimanche',t:'08:00',ty:'Culte matinal',l:'fr',r:'Hebdomadaire'},{d:'Dimanche',t:'10:30',ty:'Culte principal',l:'fr',r:'Hebdomadaire'},{d:'Mercredi',t:'18:00',ty:'Étude biblique',l:'fr',r:'Hebdomadaire'},{d:'Vendredi',t:'19:00',ty:'Veillée de louange',l:'fr',r:'Hebdomadaire'},{d:'Samedi',t:'06:00',ty:'Prières matinales',l:'fr',r:'Hebdomadaire'}],med:[{tp:'radio',n:'FIM Radio',lv:true}],nb:[],leaders:[{nom:'Berger Marcel Tshisekedi',role:'Fondateur et pasteur principal'},{nom:'Pasteur Ruth Tshisekedi',role:'Co-pasteure'}],phone:'+243 81 555 0001',email:'contact@fimkinshasa.org',website:'https://www.fimkinshasa.org',imgExt:'',imgInt:'',history:"L'Église FIM (Foi, Impact, Ministère) a été fondée en 2004 par le Berger Marcel Tshisekedi à Kinshasa. Partie d'une petite communauté de prière, elle est devenue l'une des plus grandes églises évangéliques d'Afrique centrale avec plus de 20 000 membres réguliers. Connue pour sa louange puissante et ses prédications engageantes, FIM dispose de plusieurs campus à Kinshasa et mène des actions humanitaires importantes : écoles, hôpitaux, programmes d'aide aux familles défavorisées. Sa radio FIM Radio diffuse des enseignements bibliques 24h/24."},
  {id:15,name:'Église de l\'Ascension',den:'Évangélique',city:'Abidjan',co:'CI',rt:4.5,rv:8900,cap:12000,yr:2008,v:true,bg:'#2E4053',tc:'#E8F4F8',lat:5.3453,lng:-4.0244,adr:'Cocody, Abidjan',desc:{fr:'Communauté évangélique majeure à Abidjan, reconnue pour son ministère social et son école biblique.',en:'Major evangelical community in Abidjan, known for its social ministry and Bible school.'},sch:[{d:'Dimanche',t:'08:00',ty:'Culte matinal',l:'fr',r:'Hebdomadaire'},{d:'Dimanche',t:'10:30',ty:'Culte principal',l:'fr',r:'Hebdomadaire'},{d:'Mercredi',t:'18:00',ty:'Étude biblique',l:'fr',r:'Hebdomadaire'},{d:'Vendredi',t:'18:30',ty:'Soirée de louange',l:'fr',r:'Hebdomadaire'}],med:[{tp:'radio',n:'Radio Ascension FM',lv:true}],nb:[],leaders:[{nom:'Pasteur Emmanuel Bamba',role:'Pasteur principal'},{nom:'Pasteure Sarah Bamba',role:'Responsable des femmes'}],phone:'+225 27 22 51 00 00',email:'contact@eglise-ascension.ci',website:'',imgExt:'',imgInt:'',history:"L'Église de l'Ascension a été fondée en 2008 à Cocody, Abidjan, par le Pasteur Emmanuel Bamba. En moins de 15 ans, elle est devenue l'une des plus grandes communautés évangéliques de Côte d'Ivoire avec 12 000 fidèles. Son école biblique forme chaque année des centaines de nouveaux croyants. L'église est particulièrement active dans le domaine social : construction de puits d'eau potable, soutien scolaire, programmes de microfinance pour les femmes. Radio Ascension FM diffuse ses enseignements dans toute la région."},
  {id:16,name:'Basilique Notre-Dame de la Paix',den:'Catholique',city:'Yamoussoukro',co:'CI',rt:4.6,rv:12400,cap:18000,yr:1990,v:true,bg:'#B8860B',tc:'#FAF0D7',lat:6.8143,lng:-5.2808,adr:'Yamoussoukro, Côte d\'Ivoire',desc:{fr:'Plus grande basilique du monde, inspirée de Saint-Pierre de Rome, capable d\'accueillir 18 000 fidèles.',en:'The largest basilica in the world, inspired by St. Peter\'s in Rome, holding up to 18,000 worshippers.'},sch:[{d:'Dimanche',t:'10:00',ty:'Messe solennelle',l:'fr',r:'Hebdomadaire'},{d:'Dimanche',t:'08:00',ty:'Messe',l:'fr',r:'Hebdomadaire'},{d:'Samedi',t:'17:00',ty:'Vêpres',l:'fr',r:'Hebdomadaire'},{d:'Lun-Ven',t:'06:30',ty:'Messe matinale',l:'fr',r:'Quotidien'}],med:[],nb:[],leaders:[{nom:'Mgr Marcellin Yao Kouadio',role:'Évêque de Yamoussoukro'}],phone:'+225 30 64 01 60',email:'',website:'',imgExt:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Basilique_Notre-Dame_de_la_Paix_%28Yamoussoukro%29.jpg/640px-Basilique_Notre-Dame_de_la_Paix_%28Yamoussoukro%29.jpg',imgInt:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Basilique_Notre-Dame_de_la_Paix_de_Yamoussoukro_interieur.jpg/640px-Basilique_Notre-Dame_de_la_Paix_de_Yamoussoukro_interieur.jpg',history:"La basilique Notre-Dame de la Paix de Yamoussoukro est la plus grande église chrétienne du monde, surpassant même Saint-Pierre de Rome en superficie. Construite entre 1985 et 1989 par le président Félix Houphouët-Boëty, elle a coûté environ 300 millions de dollars. Son dôme culmine à 158 mètres et ses vitraux représentent des scènes bibliques dans des couleurs africaines. Elle peut accueillir 18 000 personnes debout et 7 000 assises. Consacrée par le Pape Jean-Paul II en 1990, elle est devenue un symbole de la foi chrétienne en Afrique."}

const PR=[
  {cat:'Matin',title:'Au nom du Père',txt:"Au nom du Père, et du Fils, et du Saint-Esprit. Amen. Seigneur, je T'offre cette nouvelle journée. Que chacune de mes actions soit accomplie pour Ta gloire. Guide mes pas dans la lumière de Ton amour et garde-moi de tout péché."},
  {cat:'Matin',title:'Offrande de la journée',txt:"Mon Dieu, je crois fermement tout ce que Tu as révélé et que la sainte Église enseigne. Je T'adore avec tous les anges et les saints. Je Te remercie de Tes bienfaits. Pardonne-moi mes péchés. Je Te consacre mon corps, mon âme, mes pensées, mes actions. Sainte Vierge Marie, priez pour moi. Saint Joseph, mon patron, protégez-moi. Mon ange gardien, veillez sur moi. Amen."},
  {cat:'Matin',title:'Ange de Dieu',txt:"Ange de Dieu, qui êtes mon gardien, puisque la Bonté divine m'a confié à vous, éclairez-moi, défendez-moi, conduisez-moi et gouvernez-moi en ce jour. Amen."},
  {cat:'Matin',title:'Magnificat',txt:"Mon âme exalte le Seigneur, exulte mon esprit en Dieu, mon Sauveur ! Il s'est penché sur son humble servante ; désormais tous les âges me diront bienheureuse. Le Puissant fit pour moi des merveilles ; Saint est son nom ! Sa miséricorde s'étend d'âge en âge sur ceux qui Le craignent."},
  {cat:'Midi',title:'Angélus',txt:"Le Seigneur vous salue, Marie, pleine de grâce ; le Seigneur est avec vous. Vous êtes bénie entre toutes les femmes et Jésus, le fruit de vos entrailles, est béni. Sainte Marie, Mère de Dieu, priez pour nous pauvres pécheurs, maintenant et à l'heure de notre mort. Amen. (L'Ange du Seigneur annonça à Marie. — Et elle conçut du Saint-Esprit. Je Vous salue, Marie… Voici la servante du Seigneur. — Qu'il me soit fait selon votre parole. Je Vous salue, Marie… Et le Verbe s'est fait chair. — Et Il a habité parmi nous. Je Vous salue, Marie… Priez pour nous, sainte Mère de Dieu. — Que nous soyons rendus dignes des promesses de Christ.)"},
  {cat:'Midi',title:'Regina Caeli (Temps Pascal)',txt:"Reine du ciel, réjouissez-vous, alléluia ! Car Celui que vous avez mérité de porter, alléluia ! Est ressuscité comme Il l'avait dit, alléluia ! Priez Dieu pour nous, alléluia ! Réjouissez-vous et soyez dans l'allégresse, Vierge Marie, alléluia ! Car le Seigneur est vraiment ressuscité, alléluia !"},
  {cat:'Midi',title:'Bénédicité',txt:"Bénissez, Seigneur, nous et ces dons que nous allons recevoir de Votre libéralité. Par Christ, Notre Seigneur. Amen. (Après le repas :) Nous Vous rendons grâces, Seigneur, pour tous Vos bienfaits. Vous qui vivez et régnez pour les siècles des siècles. Amen."},
  {cat:'Soir',title:'Angélus du soir',txt:"Seigneur, en ce soir, je viens vers Toi. J'examine ma journée : les joies, les peines, mes réussites et mes échecs. Merci pour chaque instant vécu. Pardonne mes fautes et accorde-moi un sommeil paisible. Que Ta paix remplisse mon cœur et celui de mes proches."},
  {cat:'Soir',title:'Nunc Dimittis (Cantique de Siméon)',txt:"Maintenant, ô Maître souverain, Tu peux laisser Ton serviteur s'en aller en paix, selon Ta parole. Car mes yeux ont vu le salut que Tu préparais à la face des peuples : lumière qui se révèle aux nations et donne gloire à Ton peuple Israël. Gloire au Père, et au Fils, et au Saint-Esprit, pour les siècles des siècles. Amen."},
  {cat:'Soir',title:'Examen de conscience',txt:"Seigneur Jésus, en ce soir, je passe en revue ma journée devant Toi. Où ai-je vu Ta présence ? Où m'en suis-je éloigné ? Pour les moments où j'ai aimé, merci. Pour les moments où j'ai failli à l'amour, pardon. Renouvelle-moi cette nuit pour que je me lève demain plus proche de Toi."},
  {cat:'Soir',title:'Prière à Saint Michel Archange',txt:"Saint Michel Archange, défendez-nous dans le combat, soyez notre protecteur contre la méchanceté et les embûches du démon. Que Dieu exerce sur lui Son empire, nous Vous en supplions. Et vous, Prince de la Milice Céleste, par le pouvoir divin, repoussez en enfer Satan et tous les esprits mauvais qui rôdent dans le monde pour la perte des âmes. Amen."},
  {cat:'Chapelet',title:'Le Chapelet — Mystères Joyeux (Lundi et Samedi)',txt:"1. L'Annonciation — Humilité (Je Vous salue, Marie…)\n2. La Visitation — Charité fraternelle (Je Vous salue, Marie…)\n3. La Nativité de Jésus — Pauvreté et joie (Je Vous salue, Marie…)\n4. La Présentation au Temple — Obéissance (Je Vous salue, Marie…)\n5. Le Retrouvailles au Temple — Zèle pour Dieu (Je Vous salue, Marie…)\nÔ mon Jésus, pardonnez-nous nos péchés, préservez-nous du feu de l'enfer et conduisez au ciel toutes les âmes, surtout celles qui ont le plus besoin de Votre miséricorde. Amen."},
  {cat:'Chapelet',title:'Le Chapelet — Mystères Lumineux (Jeudi)',txt:"1. Le Baptême de Jésus — Ouverture à l'Esprit (Je Vous salue, Marie…)\n2. Les Noces de Cana — Confiance en Marie (Je Vous salue, Marie…)\n3. La Proclamation du Royaume — Conversion (Je Vous salue, Marie…)\n4. La Transfiguration — Contemplation (Je Vous salue, Marie…)\n5. L'Institution de l'Eucharistie — Adoration (Je Vous salue, Marie…)\nÔ mon Jésus, pardonnez-nous nos péchés, préservez-nous du feu de l'enfer et conduisez au ciel toutes les âmes, surtout celles qui ont le plus besoin de Votre miséricorde. Amen."},
  {cat:'Chapelet',title:'Le Chapelet — Mystères Douloureux (Mardi et Vendredi)',txt:"1. L'Agonie de Jésus — Contrition (Je Vous salue, Marie…)\n2. La Flagellation — Pureté (Je Vous salue, Marie…)\n3. Le Couronnement d'épines — Mortification (Je Vous salue, Marie…)\n4. Le Portement de Croix — Patience (Je Vous salue, Marie…)\n5. La Crucifixion — Persévérance (Je Vous salue, Marie…)\nÔ mon Jésus, pardonnez-nous nos péchés, préservez-nous du feu de l'enfer et conduisez au ciel toutes les âmes, surtout celles qui ont le plus besoin de Votre miséricorde. Amen."},
  {cat:'Chapelet',title:'Le Chapelet — Mystères Glorieux (Mercredi et Dimanche)',txt:"1. La Résurrection — Foi (Je Vous salue, Marie…)\n2. L'Ascension — Espérance (Je Vous salue, Marie…)\n3. La Pentecôte — Amour de Dieu (Je Vous salue, Marie…)\n4. L'Assomption — Grâce d'une bonne mort (Je Vous salue, Marie…)\n5. Le Couronnement de Marie — Confiance en Marie (Je Vous salue, Marie…)\nÔ mon Jésus, pardonnez-nous nos péchés, préservez-nous du feu de l'enfer et conduisez au ciel toutes les âmes, surtout celles qui ont le plus besoin de Votre miséricorde. Amen."},
  {cat:'Messe',title:'Acte de contrition',txt:"Mon Dieu, j'ai un très grand regret de Vous avoir offensé parce que Vous êtes infiniment bon et que le péché Vous déplaît. Je prends la ferme résolution, avec le secours de Votre sainte grâce, de ne plus Vous offenser et de faire pénitence. Amen."},
  {cat:'Messe',title:'Prières eucharistiques',txt:"Seigneur, je ne suis pas digne de Vous recevoir, mais dites seulement une parole et je serai guéri. Corps de Christ, gardez-moi pour la vie éternelle. Sang de Christ, abreuvez mon âme. Merci, Seigneur, pour ce don incomparable de Ton Corps et de Ton Sang. Que cette communion me transforme et me rende plus proche de Toi et de mes frères."},
  {cat:'Messe',title:'Adoration au Saint-Sacrement',txt:"Je Vous adore, ô Christ, et Je Vous bénis, parce que par Votre sainte Croix, Vous avez racheté le monde. Seigneur Jésus, présent dans le Saint-Sacrement, je viens me recueillir devant Toi. Tu es vraiment ici, vivant, aimant, patient. Je T'offre mes joies et mes peines. Transforme mon cœur à l'image du Tien. Amen."},
  {cat:'Confession',title:'Préparation au sacrement de réconciliation',txt:"Esprit Saint, éclaire mon cœur pour que je voie mes péchés. Seigneur Jésus, Toi qui as pardonné à la femme adultère et au bon larron, donne-moi la grâce d'une sincère contrition. J'examine ma conscience : ai-je manqué à l'amour de Dieu et de mon prochain ? Ai-je négligé la prière, la charité, la justice ? Pardonne-moi, Seigneur, et fais de moi un homme nouveau. Amen."},
  {cat:'Confession',title:'Après la confession',txt:"Merci, Seigneur, pour ce sacrement de Ta miséricorde. Je renais à Ta grâce. Aide-moi à persévérer dans le bien et à éviter les occasions de péché. Que Ta paix, plus forte que toute faute, habite en moi. Amen."},
  {cat:'Intercession',title:'Prière pour la paix dans le monde',txt:"Dieu de paix, nous T'implorons pour le monde en proie aux conflits. Touche le cœur des gouvernants, apaise les tensions, et suscite des artisans de paix. Seigneur, entends la prière des enfants qui souffrent, des familles séparées, des peuples opprimés. Donnez-nous la force de construire la justice et la fraternité. Amen."},
  {cat:'Intercession',title:'Prière pour les malades et les souffrants',txt:"Seigneur Jésus, Toi qui as guéri les malades et consolé les affligés, nous Te prions pour tous ceux qui souffrent dans leur corps ou dans leur âme. Pose Ta main sur eux. Accorde la guérison aux malades, la consolation aux déprimés, l'espérance aux désespérés. Par Ton Cœur compatissant, Seigneur, entends notre prière. Amen."},
  {cat:'Intercession',title:'Prière pour les défunts',txt:"Père miséricordieux, nous Te confions nos frères et sœurs défunts. Accueille-les dans Ta maison de lumière. Que les anges les conduisent au séjour de la paix. Que ceux qui pleurent trouvent en Toi la consolation. Et nous tous, unis dans la communion des saints, nous Te louons pour les siècles des siècles. Amen."},
  {cat:'Vierge',title:'Je Vous salue, Marie (Ave Maria)',txt:"Je Vous salue, Marie, pleine de grâce ; le Seigneur est avec Vous. Vous êtes bénie entre toutes les femmes, et Jésus, le fruit de Vos entrailles, est béni. Sainte Marie, Mère de Dieu, priez pour nous pauvres pécheurs, maintenant et à l'heure de notre mort. Amen."},
  {cat:'Vierge',title:'Salve Regina',txt:"Nous voilà devant Toi, Reine du ciel et notre Mère. Nous voilà, en ce jour qui commence. Regarde-nous, Marie, et fais que nos regards se croisent. Notre vie, notre joie, notre espoir, c'est Toi. Vers Toi nous crions, exilés, enfants d'Ève. Vers Toi nous soupirons, gémissant et pleurant dans cette vallée de larmes. Ô toi, notre avocate, tourne vers nous Tes regards miséricordieux. Amen."},
  {cat:'Vierge',title:'Memorare',txt:"Souvenez-Vous, ô très miséricordieuse Vierge Marie, qu'on n'a jamais entendu dire qu'aucun de ceux qui ont eu recours à Votre protection, imploré Votre assistance, réclamé Votre secours, ait été abandonné. Animé d'une pareille confiance, ô Vierge des vierges, ô ma Mère, je cours vers Vous ; et, gémissant sous le poids de mes péchés, je me prosterne à Vos pieds. Ô Mère du Verbe, ne méprisez pas mes prières, mais accueillez-les favorablement et daignez les exaucer. Amen."},
  {cat:'Vierge',title:'Magnificat',txt:"Mon âme exalte le Seigneur, exulte mon esprit en Dieu, mon Sauveur ! Il s'est penché sur son humble servante ; désormais tous les âges me diront bienheureuse. Le Puissant fit pour moi des merveilles ; Saint est son nom ! Sa miséricorde s'étend d'âge en âge sur ceux qui Le craignent. Déployant la force de Son bras, Il disperse les superbes. Il renverse les puissants de leurs trônes, Il élève les humbles. Il comble de biens les affamés, renvoie les riches les mains vides. Il relève Israël, son serviteur, Il se souvient de Son amour, de la promesse faite à nos pères, en faveur d'Abraham et de sa race, à jamais. Gloire au Père, et au Fils, et au Saint-Esprit, pour les siècles des siècles. Amen."},
  {cat:'Esprit',title:'Veni Creator Spiritus',txt:"Viens, Esprit Créateur, visite les âmes de Tes fidèles et emplis de la grâce d'en-Haut les cœurs que Tu as créés. Toi que l'on appelle le Consolateur, don de Dieu Très-Haut, source vive, feu, charité et ardente onction. Tu es l'Esprit aux sept dons, le doigt de la main du Père, l'Esprit promis par le Père, celui qui met sur nos lèvres les hymnes à Ta gloire. Amen."},
  {cat:'Esprit',title:'Invocation au Saint-Esprit',txt:"Viens, Esprit Saint, remplis le cœur de Tes fidèles et allume en eux le feu de Ton amour. Envoie Ton Esprit et tout sera créé. Et Tu renouveleras la face de la terre. Dieu, qui as instruit les cœurs de Tes fidèles par la lumière du Saint-Esprit, fais-nous goûter dans ce même Esprit la droiture qui console. Par Jésus-Christ, Notre Seigneur. Amen."},
  {cat:'Famille',title:'Prière pour la famille',txt:"Père céleste, bénis ma famille. Protège chacun de ses membres, affermis les liens qui nous unissent, et fais de notre foyer un reflet de Ton amour. Que la patience, le pardon et la joie habitent notre maison. Sainte Famille de Nazareth, priez pour nous. Amen."},
  {cat:'Famille',title:'Prière pour les enfants',txt:"Seigneur Jésus, Tu as dit : « Laissez les petits enfants venir à Moi ». Bénis nos enfants. Protège-les du mal. Guide leurs pas. Fais grandir en eux la sagesse, la force et la grâce. Que chaque enfant soit un don accueilli avec joie et élevé dans la foi. Amen."},
  {cat:'Protection',title:'Prière pour la protection divine',txt:"Seigneur, couvre-moi de Ton sang précieux. Que Ton ange gardien me protège en toute circonstance. Sainte Marie, étends ton manteau sur moi et ma famille. Saint Joseph, gardien de la Sainte Famille, veille sur nous. Saint Michel Archange, défendez-nous dans le combat. Amen."},
  {cat:'Louange',title:'Prière de gratitude',txt:"Je Te loue Seigneur pour Tes merveilles infinies. Pour le souffle de vie, pour l'amour qui m'entoure, pour Ta fidélité qui ne faillit jamais. Merci, Père, pour chaque jour, chaque sourire, chaque larme séchée. Ta bonté est sans fin et Ta miséricorde éternelle. Amen."},
  {cat:'Louange',title:'Te Deum',txt:"Nous Te louons, ô Dieu, nous Te reconnaissons comme le Seigneur. Toute la terre T'adore, le Père éternel. Les anges Te chantent, les cieux et toutes les puissances, les chérubins et les séraphins ne cessent de proclamer : Saint, saint, saint, le Seigneur, Dieu de l'univers ! Les apôtres, les prophètes, les martyrs Te glorifient. La sainte Église répandue par le monde reconnaît Ta majesté. À Toi, la gloire pour les siècles. Amen."}
];

  hymns:{
    lauds:{
      fr:{title:"Hymne du Matin",txt:"Ô Christ, Soleil de justice,\nTu illumines nos cœurs endormis.\nChasse les ténèbres de la nuit,\nEt fais briller Ta lumière sur nous.\n\nQue ce jour soit consacré à Ta gloire,\nQue nos lèvres Te chantent sans cesse,\nQue nos œuvres témoignent de Ta grâce,\nEt que nos pas marchent dans Ta vérité.\n\nGloire au Père, au Fils et au Saint-Esprit,\nMaintenant et toujours, et dans les siècles des siècles. Amen."},
      en:{title:"Morning Hymn",txt:"O Christ, Sun of justice,\nYou enlighten our sleeping hearts.\nDispel the darkness of the night,\nAnd make Your light shine upon us.\n\nMay this day be consecrated to Your glory,\nMay our lips sing Your praise unceasingly,\nMay our works bear witness to Your grace,\nAnd may our steps walk in Your truth.\n\nGlory to the Father, to the Son, and to the Holy Spirit,\nNow and always, and forever and ever. Amen."},
      es:{title:"Himno de la Mañana",txt:"Oh Cristo, Sol de justicia,\nTú iluminas nuestros corazones dormidos.\nAleja las tinieblas de la noche,\nY haz brillar Tu luz sobre nosotros.\n\nQue este día sea consagrado a Tu gloria,\nQue nuestros labios Te canten sin cesar,\nQue nuestras obras testimonien Tu gracia,\nY que nuestros pasos caminen en Tu verdad.\n\nGloria al Padre, al Hijo y al Espíritu Santo,\nAhora y siempre, por los siglos de los siglos. Amén."},
      pt:{title:"Hino da Manhã",txt:"Ó Cristo, Sol da justiça,\nTu iluminas nossos corações adormecidos.\nAfasta as trevas da noite,\nE faze brilhar Tua luz sobre nós.\n\nQue este dia seja consagrado à Tua glória,\nQue nossos lábios Te cantem sem cessar,\nQue nossas obras testemunhem Tua graça,\nE que nossos passos caminhem em Tua verdade.\n\nGlória ao Pai, ao Filho e ao Espírito Santo,\nAgora e sempre, pelos séculos dos séculos. Amém."},
      ar:{title:"ترنيمة الصباح",txt:"يا المسيح، شمس البر،\nأنت تنير قلوبنا النائمة.\nبدد ظلام الليل،\nواجعل نورك يشرق علينا.\n\nليكرس هذا النهار لمجدك،\nلترنم شفاهنا تسبحتك بلا انقطاع،\nلتشهد أعمالنا لنعمتك،\nولتمشِ أقدامنا في حقك.\n\nالمجد للآب والابن والروح القدس،\nالآن وكل أوان وإلى دهر الدهور. آمين."},
      zh:{title:"晨祷赞",txt:"基督，公义的太阳，\n你照亮我们沉睡的心。\n驱散黑夜的黑暗，\n使你的光照耀我们。\n\n愿这一天奉献于你的光荣，\n愿我们的唇舌不断赞美你，\n愿我们的行为见证你的恩宠，\n愿我们的脚步走在你的真理中。\n\n光荣归于父、子、圣神，\n现在、永远、直到万世。阿们。"},
      de:{title:"Morgenhymnus",txt:"O Christus, Sonne der Gerechtigkeit,\nDu erleuchtest unsere schlafenden Herzen.\nVerscheuche die Dunkelheit der Nacht,\nUnd lass Dein Licht über uns leuchten.\n\nMöge dieser Tag Deiner Ehre geweiht sein,\nMögen unsere Lippen Dich ohne Unterlass besingen,\nMögen unsere Werke von Deiner Gnade zeugen,\nUnd mögen unsere Schritte in Deiner Wahrheit wandeln.\n\nEhre dem Vater und dem Sohn und dem Heiligen Geist,\nJetzt und allezeit und in Ewigkeit. Amen."},
      ru:{title:"Утренний гимн",txt:"О Христос, Солнце правды,\nТы просвещаешь наши спящие сердца.\nРазвей тьму ночи,\nИ да воссияет Твой свет на нас.\n\nДа будет сей день посвящён Твоей славе,\nДа воспевают Тебя уста наши непрестанно,\nДа свидетельствуют дела наши о Твоей благодати,\nИ да шествуют стопы наши по Твоей истине.\n\nСлава Отцу, и Сыну, и Святому Духу,\nНыне и присно, и во веки веков. Аминь."},
      ja:{title:"朝の賛歌",txt:"おおキリスト、義の太陽よ、\nあなたは私たちの眠れる心を照らされます。\n夜の闇を払い、\nあなたの光を私たちに輝かせてください。\n\nこの日があなたの栄光に捧げられますように、\n私たちの唇が絶えずあなたを歌いますように、\n私たちの行いがあなたの恵みを証ししますように、\n私たちの歩みがあなたの真理の中を歩みますように。\n\n父と子と聖霊に栄光あれ、\n今もいつも世々に。アーメン。"},
      hi:{title:"प्रातः स्तोत्र",txt:"हे मसीह, न्याय के सूर्य,\nआप हमारे सोते हुए हृदयों को प्रकाशित करते हैं।\nरात के अंधकार को दूर करें,\nऔर अपना प्रकाश हम पर चमकाएं।\n\nयह दिन आपकी महिमा के लिए समर्पित हो,\nहमारे होठ निरंतर आपकी स्तुति करें,\nहमारे कार्य आपकी कृपा की गवाही दें,\nऔर हमारे कदम आपके सत्य में चलें।\n\nपिता और पुत्र और पवित्र आत्मा की महिमा हो,\nअब और सदा और सर्वदा के लिए। आमेन।"},
      it:{title:"Inno del Mattino",txt:"O Cristo, Sole di giustizia,\nTu illumini i nostri cuori addormentati.\nScaccia le tenebre della notte,\nE fa' splendere la Tua luce su di noi.\n\nQuesto giorno sia consacrato alla Tua gloria,\nLe nostre labbra Ti cantino senza sosta,\nLe nostre opere testimonino la Tua grazia,\nE i nostri passi camminino nella Tua verità.\n\nGloria al Padre, al Figlio e allo Spirito Santo,\nOra e sempre, e nei secoli dei secoli. Amen."},
      bn:{title:"সকালের স্তোত্র",txt:"হে খ্রিস্ট, ন্যায়বিচারের সূর্য,\nতুমি আমাদের নিদ্রিত হৃদয় আলোকিত করো।\nরাতের অন্ধকার দূর করো,\nএবং তোমার আলো আমাদের উপর উজ্জ্বল করো।\n\nএই দিন তোমার মহিমার জন্য উৎসর্গিত হোক,\nআমাদের ঠোঁট তোমার প্রশংসা গান করুক নিরন্তর,\nআমাদের কাজ তোমার অনুগ্রহের সাক্ষ্য দিক,\nএবং আমাদের পদ তোমার সত্যে হাঁটুক।\n\nপিতা এবং পুত্র এবং পবিত্র আত্মার মহিমা,\nএখন এবং সর্বদা এবং চিরকালের জন্য। আমেন।"},
      ko:{title:"아침 찬가",txt:"오 그리스도, 의의 태양이시여,\n당신은 우리의 잠든 마음을 비추십니다.\n밤의 어둠을 물리치고,\n당신의 빛을 우리에게 비추소서.\n\n이 날이 당신의 영광에 헌납되게 하시고,\n우리 입술이 끊임없이 당신을 노래하며,\n우리 행위가 당신의 은총을 증거하고,\n우리 걸음이 당신의 진리 안에서 걷게 하소서.\n\n아버지와 아들과 성령께 영광을,\n지금도 항상 영원히. 아멘."},
      id:{title:"Nyanyian Pagi",txt:"O Kristus, Matahari kebenaran,\nEngkau menerangi hati kami yang tertidur.\nUsir kegelapan malam,\nDan buatlah terang-Mu bersinar atas kami.\n\nSemoga hari ini dikuduskan bagi kemuliaan-Mu,\nSemoga bibir kami menyanyikan pujian-Mu tanpa henti,\nSemoga perbuatan kami menjadi saksi kasih karunia-Mu,\nDan semoga langkah kami berjalan dalam kebenaran-Mu.\n\nKemuliaan kepada Bapa, dan Putra, dan Roh Kudus,\nSekarang dan selalu, dan selama-lamanya. Amin."},
      tr:{title:"Sabah İlâhi",txt:"Ey Mesih, adalet Güneşi,\nUyuyan kalplerimizi aydınlatırsın.\nGecenin karanlığını kov,\nVe ışığını üzerimize parlattır.\n\nBu gün senin gloryine adansın,\nDudakların seni durmaksızın söylesin,\nAmellerin senin lütfuna şahitlik etsin,\nVe adımların senin hakikatinde yürüsün.\n\nBaba'ya, Oğul'a ve Kutsal Ruh'a glory,\nŞimdi ve daima ve sonsuza dek. Amin."},
      vi:{title:"Thánh Ca Buổi Sáng",txt:"Lạy Chúa Kitô, Mặt Trời công chính,\nChúa soi sáng trái tim ngủ mê của chúng con.\nXua tan bóng tối đêm trường,\nVà làm ánh sáng Chúa chiếu tỏa trên chúng con.\n\nXin cho ngày này được hiến dâng cho vinh quang Chúa,\nCho môi miệng chúng con không ngừng hát khen Chúa,\nCho việc làm chúng con làm chứng cho ân sủng Chúa,\nVà cho bước chân chúng con đi trong chân lý Chúa.\n\nSáng Danh Đức Chúa Cha, và Đức Chúa Con, và Đức Chúa Thánh Thần,\nBây giờ và hằng giờ và muôn đời. Amen."},
      th:{title:"เพลงสรรเสริญยามเช้า",txt:"ข้าแต่พระคริสต์ พระทิตย์แห่งความชอบธรรม\nพระองค์ทรงส่องสว่างจิตใจที่หลับใหลของเรา\nขับไล่ความมืดแห่งกลางคืน\nและทำให้แสงสว่างของพระองค์ส่องเหนือเรา\n\nขอให้วันนี้ถวายแด่พระสิริของพระองค์\nขอให้ริมฝีปากของเราสรรเสริญพระองค์ไม่หยุดหย่อน\nขอให้กิจการของเราเป็นพยานพระหรรษทานของพระองค์\nและให้ย่างเท้าของเราเดินในความจริงของพระองค์\n\nพระสิริจงมีแด่พระบิดา พระบุตร และพระจิตศักดิ์สิทธิ์\nบัดนี้และทุกขณะและนิรันดร์ อาแมน"},
      pl:{title:"Hymn Poranny",txt:"O Chrystusie, Słońce sprawiedliwości,\nRozjaśniasz nasze uśpione serca.\nRozwiej ciemności nocy,\nA spraw, by Twoje światło zabłysło nad nami.\n\nNiech ten dzień będzie poświęcony Twojej chwale,\nNiech wargi nasze nieustannie Cię wysławiają,\nNiech czyny nasze świadczą o Twojej łasce,\nA kroki nasze niech kroczą w Twojej prawdzie.\n\nChwała Ojcu i Synowi, i Duchowi Świętemu,\nTeraz i zawsze, i na wieki wieków. Amen."},
      nl:{title:"Morgenhymne",txt:"O Christus, Zon van gerechtigheid,\nGij verlicht onze slapende harten.\nVerjaag de duisternis van de nacht,\nEn doe Uw licht over ons schijnen.\n\nMoge deze dag aan Uw eer gewijd zijn,\nMogen onze lippen U onophoudelijk bezingen,\nMogen onze werken getuigen van Uw genade,\nEn mogen onze stappen in Uw waarheid wandelen.\n\nEer aan de Vader en de Zoon en de Heilige Geest,\nNu en altijd en in alle eeuwigheid. Amen."},
      ro:{title:"Imnul Dimineții",txt:"O Hristoase, Soarele dreptății,\nTu luminezi inimile noastre adormite.\nAlungă întunericul nopții,\nȘi fă ca lumina Ta să strălucească peste noi.\n\nFie această zi închinată slavei Tale,\nFie ca buzele noastre să Te cânte neîncetat,\nFie ca faptele noastre să mărturisească harul Tău,\nȘi pașii noștri să umble în adevărul Tău.\n\nSlavă Tatălui, și Fiului, și Sfântului Duh,\nAcum și pururea și în vecii vecilor. Amin."}
    },
    vespers:{
      fr:{title:"Hymne du Soir",txt:"Ô Christ, lumière du monde,\nLe jour s'éteint et la nuit approche.\nVeille sur nous dans les ténèbres,\nEt conduis-nous vers Ta paix éternelle.\n\nMerci pour les bienfaits de ce jour,\nPour les joies reçues et les peines partagées.\nAccueille nos prières du soir,\nEt prépare nos cœurs au repos de la nuit.\n\nGloire au Père, au Fils et au Saint-Esprit,\nMaintenant et toujours, et dans les siècles des siècles. Amen."},
      en:{title:"Evening Hymn",txt:"O Christ, light of the world,\nThe day fades and the night approaches.\nWatch over us in the darkness,\nAnd lead us to Your eternal peace.\n\nThank You for the blessings of this day,\nFor joys received and sorrows shared.\nReceive our evening prayers,\nAnd prepare our hearts for the rest of the night.\n\nGlory to the Father, to the Son, and to the Holy Spirit,\nNow and always, and forever and ever. Amen."},
      es:{title:"Himno de la Tarde",txt:"Oh Cristo, luz del mundo,\nEl día se apaga y la noche se acerca.\nVigílanos en las tinieblas,\nY guíanos hacia Tu paz eterna.\n\nGracias por las bendiciones de este día,\nPor las alegrías recibidas y las penas compartidas.\nAcoge nuestras oraciones de la tarde,\nY prepara nuestros corazones para el descanso de la noche.\n\nGloria al Padre, al Hijo y al Espíritu Santo,\nAhora y siempre, por los siglos de los siglos. Amén."},
      pt:{title:"Hino da Tarde",txt:"Ó Cristo, luz do mundo,\nO dia se extingue e a noite se aproxima.\nVigia-nos nas trevas,\nE guia-nos para Tua paz eterna.\n\nObrigado pelas bênçãos deste dia,\nPelas alegrias recebidas e pelas penas compartilhadas.\nAcoge nossas orações da tarde,\nE prepara nossos corações para o descanso da noite.\n\nGlória ao Pai, ao Filho e ao Espírito Santo,\nAgora e sempre, pelos séculos dos séculos. Amém."},
      ar:{title:"ترنيمة المساء",txt:"يا المسيح، نور العالم،\nيزول النهار ويقترب الليل.\nاحرسنا في الظلمة،\nوقدنا إلى سلامك الأبدي.\n\nشكراً على بركات هذا النهار،\nوعلى الأفراح التي نلناها والأتعاش التي تقاسمناها.\nاقبل صلواتنا المسائية،\nوأنر قلوبنا لراحة الليل.\n\nالمجد للآب والابن والروح القدس،\nالآن وكل أوان وإلى دهر الدهور. آمين."},
      zh:{title:"晚祷赞",txt:"基督，世界之光，\n白昼消逝，黑夜临近。\n在黑暗中守护我们，\n引领我们进入你永恒的平安。\n\n感谢这一天所赐的恩惠，\n为所领受的喜悦和分担的悲伤。\n接纳我们晚间的祈祷，\n预备我们的心灵安歇于黑夜。\n\n光荣归于父、子、圣神，\n现在、永远、直到万世。阿们。"},
      de:{title:"Abendhymnus",txt:"O Christus, Licht der Welt,\nDer Tag schwindet und die Nacht naht.\nBehüte uns in der Dunkelheit,\nUnd führe uns zu Deinem ewigen Frieden.\n\nDanke für die Wohltaten dieses Tages,\nFür empfangene Freuden und geteiltes Leid.\nNimm unser Abendgebet an,\nUnd bereite unsere Herzen auf die Nachtruhe vor.\n\nEhre dem Vater und dem Sohn und dem Heiligen Geist,\nJetzt und allezeit und in Ewigkeit. Amen."},
      ru:{title:"Вечерний гимн",txt:"О Христос, свет мира,\nДень угасает и ночь приближается.\nХрани нас во тьме,\nИ приведи нас к Твоему вечному миру.\n\nБлагодарим Тебя за благодеяния сего дня,\nЗа полученные радости и разделённые скорби.\nПрими наши вечерние молитвы,\nИ подготовь сердца наши к ночному покою.\n\nСлава Отцу, и Сыну, и Святому Духу,\nНыне и присно, и во веки веков. Аминь."},
      ja:{title:"夕の賛歌",txt:"おおキリスト、世の光よ、\n日は暮れ、夜が近づきます。\n闇の中で私たちを守り、\nあなたの永遠の平和へ導いてください。\n\nこの日の祝福に感謝します、\n与えられた喜びと分かち合った悲しみのために。\n夕べの祈りを受け入れ、\n夜の安らぎのために私たちの心を整えてください。\n\n父と子と聖霊に栄光あれ、\n今もいつも世々に。アーメン。"},
      hi:{title:"संध्या स्तोत्र",txt:"हे मसीह, संसार के प्रकाश,\nदिन ढल रहा है और रात निकट आ रही है।\nअंधकार में हमारी रक्षा करो,\nऔर हमें अपने शाश्वत शांति की ओर ले चलो।\n\nइस दिन के आशीर्वाद के लिए धन्यवाद,\nप्राप्त खुशियों और साझा दुखों के लिए।\nहमारी संध्या प्रार्थनाएं स्वीकार करो,\nऔर रात्रि विश्राम के लिए हमारे हृदय तैयार करो।\n\nपिता और पुत्र और पवित्र आत्मा की महिमा हो,\nअब और सदा और सर्वदा के लिए। आमेन।"},
      it:{title:"Inno della Sera",txt:"O Cristo, luce del mondo,\nIl giorno si spegne e la notte si avvicina.\nVeglia su di noi nelle tenebre,\nE conducici alla Tua pace eterna.\n\nGrazie per i benefici di questo giorno,\nPer le gioie ricevute e i dolori condivisi.\nAccogli le nostre preghiere della sera,\nE prepara i nostri cuori al riposo della notte.\n\nGloria al Padre, al Figlio e allo Spirito Santo,\nOra e sempre, e nei secoli dei secoli. Amen."},
      bn:{title:"সন্ধ্যার স্তোত্র",txt:"হে খ্রিস্ট, জগতের আলো,\nদিন ম্লান হয় এবং রাত এগিয়ে আসে।\nঅন্ধকারে আমাদের পাহারা দাও,\nএবং তোমার চির শান্তির দিকে আমাদের নিয়ে যাও।\n\nএই দিনের আশীর্বাদ জন্য ধন্যবাদ,\nপ্রাপ্ত আনন্দ এবং ভাগ করা দুঃখ জন্য।\nআমাদের সন্ধ্যা প্রার্থনা গ্রহণ করো,\nএবং রাতের বিশ্রামের জন্য আমাদের হৃদয় প্রস্তুত করো।\n\nপিতা এবং পুত্র এবং পবিত্র আত্মার মহিমা,\nএখন এবং সর্বদা এবং চিরকালের জন্য। আমেন।"},
      ko:{title:"저녁 찬가",txt:"오 그리스도, 세상의 빛이시여,\n해가 지고 밤이 다가옵니다.\n어둠 속에서 우리를 지켜보시고,\n당신의 영원한 평화로 이끄소서.\n\n이 날의 축복에 감사드리며,\n받은 기쁨과 나눈 슬픔에 감사드립니다.\n저녁 기도를 받아들이시고,\n밤의 안식을 위해 우리 마음을 준비하소서.\n\n아버지와 아들과 성령께 영광을,\n지금도 항상 영원히. 아멘."},
      id:{title:"Nyanyian Sore",txt:"O Kristus, terang dunia,\nHari memudar dan malam mendekat.\nJagalah kami dalam kegelapan,\nDan pimpin kami menuju damai abadi-Mu.\n\nTerima kasih atas berkat hari ini,\nAtas sukacita yang diterima dan duka yang dibagi.\nTerimalah doa sore kami,\nDan persiapkan hati kami untuk istirahat malam.\n\nKemuliaan kepada Bapa, dan Putra, dan Roh Kudus,\nSekarang dan selalu, dan selama-lamanya. Amin."},
      tr:{title:"Akşam İlâhi",txt:"Ey Mesih, dünyanın ışığı,\nGün soluyor ve gece yaklaşıyor.\nKaranlıkta bizi gözet,\nVe bizi ebedi barışına götür.\n\nBu günün nimetleri için teşekkür,\nAlınan sevinçler ve paylaşılan kederler için.\nAkşam dualarımızı kabul et,\nVe gecenin istirahati için kalplerimizi hazırla.\n\nBaba'ya, Oğul'a ve Kutsal Ruh'a glory,\nŞimdi ve daima ve sonsuza dek. Amin."},
      vi:{title:"Thánh Ca Buổi Tối",txt:"Lạy Chúa Kitô, ánh sáng thế gian,\nNgày tàn và đêm đang đến gần.\nXin canh giữ chúng con trong bóng tối,\nVà dẫn chúng con vào bình an vĩnh cửu của Chúa.\n\nCảm tạ vì những ơn lành trong ngày hôm nay,\nVì niềm vui nhận được và nỗi buồn đã chia sẻ.\nXin nhận lời cầu nguyện buổi tối của chúng con,\nVà chuẩn bị tâm hồn chúng con cho giấc ngủ đêm.\n\nSáng Danh Đức Chúa Cha, và Đức Chúa Con, và Đức Chúa Thánh Thần,\nBây giờ và hằng giờ và muôn đời. Amen."},
      th:{title:"เพลงสรรเสริญยามค่ำ",txt:"ข้าแต่พระคริสต์ แสงสว่างของโลก\nกลางวันมอดดับและกลางคืนกำลังเข้ามา\nคุ้มครองเราในความมืดมน\nและนำเราสู่สันติภาพนิรันดรของพระองค์\n\nขอบคุณพระพรของวันนี้\nสำหรับความยินดีที่ได้รับและความทุกข์ที่แบ่งปัน\nรับคำสวด вечераของเรา\nและเตรียมจิตใจของเราเพื่อการพักผ่อนกลางคืน\n\nพระสิริจงมีแด่พระบิดา พระบุตร และพระจิตศักดิ์สิทธิ์\nบัดนี้และทุกขณะและนิรันดร์ อาแมน"},
      pl:{title:"Hymn Wieczorny",txt:"O Chrystusie, światłości świata,\nDzień przemija i noc się zbliża.\nStrzeż nas w ciemności,\nI zaprowadź nas do Twego wiecznego pokoju.\n\nDziękujemy za dobrodziejstwa tego dnia,\nZa otrzymane radości i podzielone smutki.\nPrzyjmij naszą modlitwę wieczorną,\nI przygotuj nasze serca do nocnego spoczynku.\n\nChwała Ojcu i Synowi, i Duchowi Świętemu,\nTeraz i zawsze, i na wieki wieków. Amen."},
      nl:{title:"Avondhymne",txt:"O Christus, licht van de wereld,\nDe dag vergaat en de nacht nadert.\nHoed ons in de duisternis,\nEn leid ons tot Uw eeuwige vrede.\n\nDank U voor de weldaden van deze dag,\nVoor ontvangen vreugde en gedeeld leed.\nOntvang ons avondgebed,\nEn bereid onze harten voor op de nachtrust.\n\nEer aan de Vader en de Zoon en de Heilige Geest,\nNu en altijd en in alle eeuwigheid. Amen."},
      ro:{title:"Imnul Searii",txt:"O Hristoase, lumina lumii,\nZiua apune și noaptea se apropie.\nPăzește-ne în întuneric,\nȘi ne condu spre pacea Ta veșnică.\n\nÎți mulțumim pentru binefacerile acestei zile,\nPentru bucuriile primite și durerile împărtășite.\nPrimește rugăciunile noastre de seară,\nȘi pregătește inimile noastre pentru odihna nopții.\n\nSlavă Tatălui, și Fiului, și Sfântului Duh,\nAcum și pururea și în vecii vecilor. Amin."}
    },
    compline:{
      fr:{title:"Hymne de la Nuit",txt:"Avant la fin du jour qui s'éteint,\nCréateur du monde, nous Te supplions,\nQue dans Ta miséricorde Tu sois notre gardien,\nEt notre protecteur pendant la nuit.\n\nQue le fardeau pesant du sommeil,\nNe nous entraîne pas dans le péché,\nEt que jamais le malin ne nous sépare de Toi.\n\nExauce-nous, Père tout-puissant,\nPar Jésus-Christ, Ton Fils unique,\nQui règne avec Toi et le Saint-Esprit,\nPour les siècles des siècles. Amen."},
      en:{title:"Night Hymn",txt:"Before the ending of the fading day,\nCreator of the world, we pray to Thee,\nThat in Thy mercy Thou wouldst be our guard,\nAnd our protector through the night.\n\nMay the heavy burden of sleep,\nNot draw us into sin,\nAnd may the evil one never separate us from Thee.\n\nHear us, almighty Father,\nThrough Jesus Christ, Thy only Son,\nWho reigns with Thee and the Holy Spirit,\nFor ever and ever. Amen."},
      es:{title:"Himno de la Noche",txt:"Antes del final del día que se apaga,\nCreador del mundo, Te suplicamos,\nQue en Tu misericordia seas nuestro guardián,\nY nuestro protector durante la noche.\n\nQue la pesada carga del sueño,\nNo nos arrastre al pecado,\nY que nunca el maligno nos separe de Ti.\n\nEscúchanos, Padre todopoderoso,\nPor Jesucristo, Tu Hijo único,\nQue reina contigo y el Espíritu Santo,\nPor los siglos de los siglos. Amén."},
      pt:{title:"Hino da Noite",txt:"Antes do fim do dia que se extingue,\nCriador do mundo, nós Te suplicamos,\nQue em Tua misericórdia sejas nosso guardião,\nE nosso protetor durante a noite.\n\nQue o pesado fardo do sono,\nNão nos arraste ao pecado,\nE que nunca o maligno nos separe de Ti.\n\nOuve-nos, Pai todo-poderoso,\nPor Jesus Cristo, Teu Filho único,\nQue reina contigo e o Espírito Santo,\nPelos séculos dos séculos. Amém."},
      ar:{title:"ترنيمة الليل",txt:"قبل نهاية النهار الزائل،\nيا خالق العالم، نتضرع إليك،\nأن برحمتك تكون حارسنا،\nوحامينا خلال الليل.\n\nلا يد ثقل النوم،\nيجرنا إلى الخطيئة،\nولا يفرقنا الشرير عنك أبداً.\n\nاستجب لنا أيها الآب القادر على كل شيء،\nبيسوع المسيح ابنك الوحيد،\nالذي يملك معك ومع الروح القدس،\nإلى دهر الدهور. آمين."},
      zh:{title:"夜祷赞",txt:"在消逝的白昼结束之前，\n世界的创造者，我们恳求你，\n以你的仁慈作我们的守护者，\n在夜间作我们的保护者。\n\n愿睡眠的沉重负担，\n不使我们陷入罪恶，\n愿恶者永远不能使我们与你分离。\n\n全能的天父，请俯听我们，\n借着你的独生子耶稣基督，\n他与你及圣神同在，为王直到永远。阿们。"},
      de:{title:"Nachthymnus",txt:"Vor dem Ende des schwindenden Tages,\nSchöpfer der Welt, bitten wir Dich,\nDass Du in Deiner Barmherzigkeit unser Hüter seist,\nUnd unser Beschützer durch die Nacht.\n\nMöge die schwere Last des Schlafes,\nUns nicht in die Sünde ziehen,\nUnd möge der Böse uns niemals von Dir trennen.\n\nErhöre uns, allmächtiger Vater,\nDurch Jesus Christus, Deinen eingeborenen Sohn,\nDer mit Dir und dem Heiligen Geist regiert,\nVon Ewigkeit zu Ewigkeit. Amen."},
      ru:{title:"Ночной гимн",txt:"Прежде окончания угасающего дня,\nСоздатель мира, мы молим Тебя,\nДабы в милости Твоей Ты был нашим хранителем,\nИ нашим защитником в ночь.\n\nДа не увлечёт нас тяжкий负担 сна,\nВо грех,\nИ да не разлучит нас лукавый с Тобою никогда.\n\nУслышь нас, Всемогущий Отец,\nЧерез Иисуса Христа, Единородного Сына Твоего,\nКоторый царствует с Тобою и Святым Духом,\nВо веки веков. Аминь."},
      ja:{title:"夜の賛歌",txt:"暮れゆく日の終わりの前に、\n世界の創造主よ、あなたに祈ります、\nあなたの憐れみの中で私たちの守り手となり、\n夜通し私たちの保護者となってください。\n\n眠りの重荷が、\n私たちを罪に引き込まないように、\nそして悪者が決して私たちをあなたから引き離しませんように。\n\n全能の父よ、私たちの祈りを聞き届けてください、\nあなたの独り子イエス・キリストによって、\nあなたと聖霊と共に統治される方、\n世々に。アーメン。"},
      hi:{title:"रात्रि स्तोत्र",txt:"ढलते दिन के अंत से पहले,\nसंसार के सृजनहार, हम आपसे प्रार्थना करते हैं,\nकि अपनी करुणा में आप हमारे रक्षक बनें,\nऔर रात भर हमारे संरक्षक बनें।\n\nनींद का भारी बोझ,\nहमें पाप में न खींचे,\nऔर बुरा हमें आपसे कभी जुदा न करे।\n\nसर्वशक्तिमान पिता, हमारी सुनो,\nयीशु मसीह, आपके एकलौते पुत्र के द्वारा,\nजो आपके और पवित्र आत्मा के साथ राज्य करता है,\nसदा के लिए। आमेन।"},
      it:{title:"Inno della Notte",txt:"Prima del finire del giorno che si spegne,\nCreatore del mondo, Ti supplichiamo,\nChe nella Tua misericordia Tu sia il nostro custode,\nE nostro protettore durante la notte.\n\nChe il pesante fardello del sonno,\nNon ci trascini nel peccato,\nE che il maligno non ci separi mai da Te.\n\nEsaudiscici, Padre onnipotente,\nPer Gesù Cristo, Tuo Figlio unico,\nChe regna con Te e lo Spirito Santo,\nNei secoli dei secoli. Amen."},
      bn:{title:"রাতের স্তোত্র",txt:"ম্লান হয়ে যাওয়া দিনের শেষের আগে,\nজগতের স্রষ্টা, আমরা তোমার কাছে প্রার্থনা করি,\nযে তোমার করুণায় তুমি আমাদের রক্ষক হবে,\nএবং রাত জুড়ে আমাদের অভিভাবক হবে।\n\nঘুমের ভারী বোঝা,\nআমাদের পাপে টেনে না নিয়ে যায়,\nএবং মন্দ যেন কখনো আমাদের তোমা থেকে বিচ্ছিন্ন না করে।\n\nসর্বশক্তিমান পিতা, আমাদের শোনো,\nযীশু খ্রিস্টের মাধ্যমে, তোমার একমাত্র পুত্র,\nযিনি তোমার এবং পবিত্র আত্মার সাথে রাজত্ব করেন,\nচিরকালের জন্য। আমেন।"},
      ko:{title:"밤 찬가",txt:"사라지는 하루가 끝나기 전에,\n세상의 창조주여, 우리가 당신께 기도합니다,\n당신의 자비로 우리의 보호자가 되시고,\n밤새 우리의 수호자가 되소서.\n\n잠의 무거운 짐이,\n우리를 죄로 끌어들이지 않게 하시고,\n사악한 자가 결코 우리를 당신에게서 갈라놓지 않게 하소서.\n\n전능하신 아버지여, 우리의 기도를 들으소서,\n당신의 외아들 예수 그리스도를 통하여,\n그분은 당신과 성령과 함께 다스리시니,\n영원토록. 아멘."},
      id:{title:"Nyanyian Malam",txt:"Sebelum berakhirnya hari yang memudar,\nPencipta dunia, kami berdoa kepada-Mu,\nBahwa dalam rahmat-Mu Engkau menjadi penjaga kami,\nDan pelindung kami sepanjang malam.\n\nMoga beban berat tidur,\nTidak menarik kami ke dalam dosa,\nDan biarlah yang jahat tidak pernah memisahkan kami dari-Mu.\n\nDengarkanlah kami, Bapa mahakuasa,\nMelalui Yesus Kristus, Putra-Mu yang tunggal,\nYang memerintah bersama-Mu dan Roh Kudus,\nSelama-lamanya. Amin."},
      tr:{title:"Gece İlâhi",txt:"Solan günün bitiminden önce,\nDünyanın Yaratıcısı, Sana yalvarıyoruz,\nMerhametinde bekçimiz ol,\nVe gece boyunca koruyucumuz ol.\n\nUykunun ağır yükü,\nBizi günaha sürüklemesin,\nVe kötü olan bizi Senden asla ayırmasın.\n\nBizi işit, her şeye gücü yeten Baba,\nİsa Mesih, Senin biricik Oğlun aracılığıyla,\nKi Senin ve Kutsal Ruh'la birlikte hüküm sürer,\nSonsuza dek. Amin."},
      vi:{title:"Thánh Ca Ban Đêm",txt:"Trước khi kết thúc ngày đang tàn,\nĐấng Tạo Hóa thế gian, chúng con nài xin Chúa,\nRằng trong lòng thương xót Chúa là Đấng canh giữ chúng con,\nVà là Đấng bảo vệ chúng con suốt đêm.\n\nXin cho gánh nặng giấc ngủ,\nĐừng kéo chúng con vào tội lỗi,\nVà xin đừng để kẻ dữ永远 chia lìa chúng con khỏi Chúa.\n\nXin nhậm lời chúng con, Cha toàn năng,\nNhờ Đức Giêsu Kitô, Con Một Cha,\nĐấng ngự trị cùng Cha và Chúa Thánh Thần,\nMuôn đời. Amen."},
      th:{title:"เพลงสรรเสริญยามกลางคืน",txt:"ก่อนวันมอดดับจะสิ้นสุดลง\nพระผู้สร้างโลก เราวิงวอนพระองค์\nด้วยความเมตตาของพระองค์ ทรงเป็นผู้คุ้มกันเรา\nและผู้คุ้มครองเราตลอดคืน\n\nขอให้ภาระหนักของการนอน\nไม่ดึงเราเข้าสู่บาป\nและขอให้ผู้ชั่วร้ายไม่แยกเราจากพระองค์เลย\n\nฟังเราเถิด พระบิดาผู้ทรงฤทธานุภาพ\nทางพระเยซูคริสต์ พระบุตรองค์เดียวของพระองค์\nผู้ทรงครองราชย์ร่วมกับพระองค์และพระจิตศักดิ์สิทธิ์\nตลอดนิรันดร์ อาแมน"},
      pl:{title:"Hymn Nocny",txt:"Przed końcem dnia, który przemija,\nStwórco świata, błagamy Cię,\nAbyś w swoim miłosierdziu był naszym strażnikiem,\nI naszym obrońcą przez noc.\n\nNiech ciężar snu,\nNie pociągnie nas do grzechu,\nI niech złowrogi nigdy nas od Ciebie nie oddzieli.\n\nWysłuchaj nas, Ojcze wszechmogący,\nPrzez Jezusa Chrystusa, Twego Jednorodzonego Syna,\nKtóry króluje z Tobą i Duchem Świętym,\nNa wieki wieków. Amen."},
      nl:{title:"Nachthymne",txt:"Voor het einde van de vervagende dag,\nSchepper van de wereld, wij smeken U,\nDat Gij in Uw barmhartigheid onze hoeder zijt,\nEn onze beschermer door de nacht.\n\nMoge de zware last van de slaap,\nOns niet in de zonde trekken,\nEn moge de boze ons nooit van U scheiden.\n\nVerhoor ons, almachtige Vader,\nDoor Jezus Christus, Uw eniggeboren Zoon,\nDie met U en de Heilige Geest regeert,\nTot in alle eeuwigheid. Amen."},
      ro:{title:"Imnul Nopții",txt:"Înainte de sfârșitul zilei care se stinge,\nCreator al lumii, Te implorăm,\nCa în mila Ta să fii păzitorul nostru,\nȘi protectorul nostru pe timpul nopții.\n\nFie ca povara grea a somnului,\nSă nu ne tragă în păcat,\nȘi niciodată cel rău să nu ne despartă de Tine.\n\nAscultă-ne, Atotputernice Tată,\nPrin Iisus Hristos, Fiul Tău unic,\nCare domnește cu Tine și cu Sfântul Duh,\nÎn vecii vecilor. Amin."}
    }
  }
};

function saveAll(){
  try{localStorage.setItem('eccl_ch',JSON.stringify(CH));localStorage.setItem('eccl_nid',String(nextId))}catch(e){}

  try{localStorage.setItem('eccl_chreg',JSON.stringify(CHURCHES))}catch(e){}
  try{localStorage.setItem('eccl_grp',JSON.stringify(GROUPS));localStorage.setItem('eccl_ngid',String(nextGrp))}catch(e){}
  try{localStorage.setItem('eccl_post',JSON.stringify(POSTS));localStorage.setItem('eccl_nmsgid',String(nextMsg))}catch(e){}
  try{localStorage.setItem('eccl_admins',JSON.stringify(ADMINS))}catch(e){}
