        <button class="fbtn ${isF?'on':''}" onclick="tf(${id})" id="fb${id}">${isF?'★ Favori':'☆ Ajouter'}</button>
      </div>
      <div class="langbar">${av.map(l=>`<button class="lchip ${l===cl?'on':''}" onclick="sl('${l}',${id})">${LL[l]}</button>`).join('')}</div>
      <div style="padding:16px 0 10px;font-size:14px;color:#6B6862;line-height:1.7">${desc}</div>
      ${admBtn}
      <div class="stitle">📅 Programmes & célébrations</div>
      ${c.sch&&c.sch.length?c.sch.map(s=>`<div class="sitem"><div class="sday">${s.d.substring(0,3)}</div><div style="flex:1"><div style="font-size:13px;font-weight:600">${TI[s.ty]||'✝'} ${s.ty}</div><div style="font-size:12px;color:#9B9890;margin-top:2px">${s.t} · ${s.r} · ${s.l.toUpperCase()}</div></div><div class="tybdg">${s.r}</div></div>`).join(''):'<p style="font-size:13px;color:var(--muted)">Programme non disponible</p>'}

      <div class="stitle">📞 Contacts</div>

      ${c.website?`<div class="contact-row"><div class="ic">🌐</div><a href="${c.website}" target="_blank" style="color:var(--gold);text-decoration:none;word-break:break-all">${c.website}</a></div>`:''}

    </div>`;

  ['map','media','prayers','breviary','books','favorites','register','churchreg','admin','community','groups','account','login','welcome'].forEach(x=>document.getElementById('v'+x).style.display=x===v?'flex':'none');

  document.getElementById('mainNav').style.display=hideNav?'none':'flex';
  document.getElementById('langWrap').style.display=hideNav?'none':'block';
  const fb=document.getElementById('filterBar');
  if(fb)fb.style.display=hideNav?'none':'flex';
  const navViews=['welcome','map','media','prayers','breviary','books','favorites','register','churchreg','admin','community','groups','account'];
  document.querySelectorAll('.nb').forEach(b=>{

e, generato prima di ogni creatura.",bn:"গীত 110: প্রভু আমার প্রভুকে বললেন: আমার ডানদিকে বসো।\nগীত 114: হাল্লেলুইয়াহ! প্রভুর ধন্যবাদ করো, কারণ তিনি ভালো।\nকল 1: খ্রিস্ট, অদৃশ্য ঈশ্বরের প্রতিমূর্তি, সমস্ত সৃষ্টির প্রথম জাত।",ko:"시 110: 주님께서 내 주님께 말씀하셨다. 너는 내 오른쪽에 앉아라.\n시 114: 알렐루야! 주님께 감사하여라, 그분은 좋으시니.\n콜로 1: 그리스도, 보이지 않는 하느님의상이시며 모든 피조물에 우선하여 나신 분이시니.",id:"Mz 110: Tuhan bersabda kepada Tuanku: duduklah di sebelah kanan-Ku.\nMz 114: Alleluia! Bersyukurlah kepada Tuhan, sebab Ia baik!\nKol 1: Kristus, gambaran Allah yang tidak kelihatan, yang sulung dari segala ciptaan.",tr:"Mez 110: Rab, benim Rabbime dedi: Sağ yanıma otur.\nMez 114: Alleluya! Rab'be şükredin, çünkü O iyidir.\nKol 1: Mesih, görünmeyen Tanrı'nın sureti, bütün yaratılıştan önce doğandır.",vi:"Tv 110: Chúa phán cùng Đức Chúa của tôi: hãy ngự bên hữu Cha.\nTv 114: Alleluia! Hãy tạ ơn Chúa, vì Chúa nhân lành.\nCl 1: Đức Kitô là hình ảnh Thiên Chúa vô hình, là Trưởng Tử của mọi loài thọ tạo.",th:"สดด 110: องค์พระผู้เป็นเจ้าตรัสกับองค์พระผู้เป็นเจ้าของข้าพเจ้าว่า จงนั่งข้างขวาของเรา\nสดด 114: อัลเลลูยา! ขอขอบพระคุณองค์พระผู้เป็นเจ้า เพราะพระองค์ประเสริฐ\nคโล 1: พระคริสตเจ้าเป็นภาพลักษณ์ของพระเจ้าผู้ไม่สามารถแลเห็นได้ พระองค์เป็นบุตรหัวปีของสรรพสร้าง",pl:"Ps 110: Pan rzekł do Pana mego: Usiądź po prawej mojej!\nPs 114: Alleluja! Dziękujcie Panu, bo jest dobry.\nKol 1: Chrystus jest obrazem Boga niewidzialnego, Pierworodnym każdego stworzenia.",nl:"Ps. 110, 1-5: De Heer sprak tot mijn Heer: zet U neer aan Mijn rechterhand.\nPs. 114: Alleluia! Dankt de Heer, want Hij is goed.\nKol 1, 12-20: Christus, het beeld van de onzichtbare God, Eerstgeborene van alle schepping.",ro:"Ps. 110, 1-5: Domnul a zis Domnului meu: Șezi la dreapta Mea.\nPs. 114: Aleluia! Lăudați-L pe Domnul, căci este bun.\nCol 1, 12-20: Hristos, chipul lui Dumnezeu celui nevăzut, Mai-născut a toată făptura."

    compline:{fr:"Ps. 4: Quand je crie, réponds-moi, Dieu de justice.\nPs. 91: Celui qui demeure sous la protection du Très-Haut.\nCantique (Lc 2, 29-32): Maintenant, ô Maître souverain, tu peux laisser ton serviteur s'en aller dans la paix.",en:"Ps. 4: When I call, answer me, God my justice.\nPs. 91: He who dwells in the shelter of the Most High.\nCanticle (Lk 2, 29-32): Now, Lord, you let your servant go in peace.",es:"Sal. 4: Cuando te invoco, respóndeme, Dios de mi justicia.\nSal. 91: El que habita al amparo del Altísimo.\nCántico (Lc 2, 29-32): Ahora, Señor, puedes dejar a tu siervo irse en paz.",pt:"Sl. 4: Quando eu chamo, responde-me, Deus da minha justiça.\nSl. 91: Aquele que habita sob a proteção do Altíssimo.\nCântico (Lc 2, 29-32): Agora, Senhor, podeis deixar o vosso servo ir em paz.",ar:"مز 4: إذا دعوت فأجبني يا الله بري.\nمز 91: الساكن في ستر العلي.\nنشيد (لو 2): الآن يا سيد تطلق عبدك بسلام.",zh:"咏 4: 我呼求时，求你应允我，公义的天主。\n咏 91: 那住在至高者隐秘处的。\n歌 路 2: 上主，现在可照你的话，放你的仆人平安去了。",de:"Ps. 4: Wenn ich rufe, antworte mir, Gott meiner Gerechtigkeit.\nPs. 91: Wer im Schirm des Höchsten wohnt.\nKantikel (Lk 2, 29-32): Nun lässt du, Herr, deinen Diener in Frieden scheiden.",ru:"Пс. 4: Когда взываю, услышь меня, Боже правды моей.\nПс. 90: Живущий под кровом Всевышнего.\nПеснь (Лк 2): Ныне отпускаешь раба Твоего, Владыка, с миром.",ja:"詩 4: わたしが呼ぶとき、答えてください、わたしの義の神よ。\n詩 91: いと高き方の隠れ場に住む者。\ncanticle (ルカ 2): 主よ、今こそあなたは、お言葉どおり、この僕を去らせてくださいます。",hi:"भजन 4: जब मैं पुकारता हूं, उत्तर दो, हे मेरे न्याय के परमेश्वर।\nभजन 91: जो सर्वोच्च के आश्रय में रहता है।\nगीत (लूका 2): हे प्रभु, अब तू अपने सेवक को शांति में विदा करता है।",it:"Sal. 4: Quando ti invoco, rispondimi, Dio della mia giustizia.\nSal. 91: Chi abita sotto la protezione dell'Altissimo.\nCantico (Lc 2, 29-32): Ora lascia, o Signore, che il tuo servo vada in pace.",bn:"গীত 4: যখন আমি ডাকি, উত্তর দাও, হে আমার ন্যায়ের ঈশ্বর।\nগীত 91: যে সর্বোচ্চের আশ্রয়ে বাস করে।\nগান (লূক 2): এখন, হে প্রভু, তুমি তোমার দাসকে শান্তিতে যেতে দাও।",ko:"시 4: 내가 부르짖을 때 내义의 하느님이여, 내게 응답하소서.\n시 91: 지극히 높으신 분의 보호 안에 머무르는 이여.\n루가 2: 주님, 이제 말씀하신 대로 종을 평화로이 떠나보내소서.",id:"Mz 4: Bila aku berseru, jawablah aku, Allah yang membenarkanku.\nMz 91: Orang yang diam dalam perlindungan Yang Mahatinggi.\nNyanyian (Luk 2, 29-32): Sekarang, Tuhan, biarlah hamba-Mu ini pergi dalam damai.",tr:"Mez 4: Çağırdığımda cevap ver, ey adalet Tanrım!\nMez 91: Yüce Olan'ın barınağında barınan.\nİlâhi (Luka 2): Şimdi, Ya Rab, kulun huzur içinde gidiyor.",vi:"Tv 4: Lạy Thiên Chúa là Đấng bênh vực con, khi con kêu cầu, xin đáp lại.\nTv 91: Ai trú ngụ ở nơi Đấng Tối Cao phù trợ.\nCa (Lc 2, 29-32): Lạy Chúa, giờ đây Chúa để tôi tớ này ra đi bình an.",th:"สดด 4: เมื่อข้าพเจ้าทูลขอ ขอพระองค์ทรงตอบข้าพเจ้า ข้าแต่พระเจ้าผู้ทรงชอบธรรมของข้าพเจ้า\nสดด 91: ผู้ที่อาศัยอยู่ในที่กำบังขององค์ผู้สูงสุด\nเพลง (ลก 2): บัดนี้ องค์พระผู้เป็นเจ้า โปรดให้ผู้รับใช้ของพระองค์ไปเป็นสุขเถิด",pl:"Ps 4: Gdy wołam, odpowiedz mi, Boże sprawiedliwości mojej!\nPs 91: Kto mieszka w osłonie Najwyższego.\nKantyk (Łk 2, 29-32): Teraz, Władco, pozwól odejść słudze Twemu w pokoju.",nl:"Ps. 4: Als ik roep, verhoor mij, God van mijn gerechtigheid.\nPs. 91: Hij die in de schuilplaats van de Allerhoogste woont.\nCantikel (Lk 2, 29-32): Nu laat Gij, Heer, Uw dienaar heengaan in vrede.",ro:"Ps. 4: Când strig, răspunde-mi, Dumnezeul dreptății mele.\nPs. 91: Cel care locuiește în ajutorul Preaînaltului.\nCântare (Lc 2, 29-32): Acum, Doamne, lasă pe robul Tău să meargă în pace."
    },
    terce:{fr:"Ps. 119, 81-88: Mon âme languit après Ta promesse.\nPs. 119, 89-96: Ta parole, Seigneur, subsiste éternellement.",en:"Ps. 119, 81-88: My soul longs for Your promise.\nPs. 119, 89-96: Your word, Lord, stands forever.",es:"Sal. 119, 81-88: Mi alma languidece por Tu promesa.\nSal. 119, 89-96: Tu palabra, Señor, permanece para siempre.",pt:"Sl. 119, 81-88: Minha alma anseia por Tua promessa.\nSl. 119, 89-96: Tua palavra, Senhor, permanece para sempre.",ar:"مز 119: تشتاق نفسي إلى وعدك.\nمز 119: كلمتك يا رب ثابتة إلى الأبد.",zh:"咏 119: 我的灵魂渴慕你的诺言。\n咏 119: 上主，你的话永远长存。",de:"Ps. 119, 81-88: Meine Seele schmachtet nach Deiner Verheißung.\nPs. 119, 89-96: Dein Wort, Herr, bleibt in Ewigkeit.",ru:"Пс. 118: Истомилась душа моя о слове Твоём.\nПс. 118: Слово Твоё, Господи, пребывает вовек.",ja:"詩 119: わたしの魂はあなたの約束を慕いあこがれます。\n詩 119: 主よ、あなたの言葉はとこしえに変わることがありません。",hi:"भजन 119: मेरा आत्मा तेरे वचन के लिए तरसता है।\nभजन 119: हे प्रभु, तेरा वचन सदा के लिए स्थिर है।",it:"Sal. 119, 81-88: L'anima mia languisce per la Tua promessa.\nSal. 119, 89-96: La Tua parola, Signore, sussiste per sempre.",bn:"গীত 119: আমার আত্মা তোমার প্রতিশ্রুতির জন্য অপেক্ষা করে।\nগীত 119: তোমার বাক্য, হে প্রভু, চিরকাল স্থায়ী।",ko:"시 119: 내 영혼이 당신의 말씀을 그리워하나이다.\n시 119: 주님의 말씀은 영원히 서 있나이다.",id:"Mz 119: Jiwaku rindu kepada janji-Mu.\nMz 119: Firman-Mu, Tuhan, tetap untuk selama-lamanya.",tr:"Mez 119: Ruhum senin vaadine hasret çekiyor.\nMez 119: Senin sözün, Ya Rab, sonsuza dek durur.",vi:"Tv 119: Linh hồn con khát khao lời hứa của Ngài.\nTv 119: Lời Ngài, lạy Chúa, tồn tại muôn đời.",th:"สดด 119: จิตวิญญาณของข้าพเจ้าโหยหาพระสัญญาของพระองค์\nสดด 119: พระวจนะของพระองค์ดำรงอยู่เป็นนิตย์",pl:"Ps 119: Dusza moja ustaje z tęsknoty za Twoim słowem.\nPs 119: Słowo Twoje, Panie, trwa na wieki.",nl:"Ps. 119, 81-88: Mijn ziel smacht naar Uw belofte.\nPs. 119, 89-96: Uw woord, Heer, bestaat in eeuwigheid.",ro:"Ps. 119, 81-88: Sufletul meu tânjește după promisiunea Ta.\nPs. 119, 89-96: Cuvântul Tău, Doamne, rămâne în veac."
    },
    sext:{fr:"Ps. 119, 105-112: Ta parole est une lampe à mes pieds.\nPs. 119, 113-120: J'ai haï les coeurs partagés, mais j'aime Ta loi.",en:"Ps. 119, 105-112: Your word is a lamp to my feet.\nPs. 119, 113-120: I hate the double-minded, but I love Your law.",es:"Sal. 119, 105-112: Tu palabra es lámpara para mis pies.\nSal. 119, 113-120: Yo odio a los hipócritas, pero amo Tu ley.",pt:"Sl. 119, 105-112: Tua palavra é lâmpada para meus pés.\nSl. 119, 113-120: Eu odeio os duplos de espírito, mas amo Tua lei.",ar:"مز 119: كلامك سراج لقدمي.\nمز 119: أبغض المتشعبين، لكن أحببت ناموسك.",zh:"咏 119: 你的话是我脚前的明灯。\n咏 119: 我痛恨三心二意的人，但我爱慕你的法律。",de:"Ps. 119, 105-112: Dein Wort ist eine Leuchte für meine Füße.\nPs. 119, 113-120: Ich hasse die Wankelmütigen, aber ich liebe Dein Gesetz.",ru:"Пс. 118: Слово Твоё — светильник ноге моей.\nПс. 118: Вымыслы ненавижу, а закон Твой люблю.",ja:"詩 119: あなたの言葉はわたしの足のともしび。\n詩 119: 二心ある者を憎み、あなたの律法を愛します。",hi:"भजन 119: तेरा वचन मेरे पैरों के लिए दीपक है।\nभजन 119: मैं द्विमनस्कों से घृणा करता हूं, पर तेरे नियम से प्रेम।",it:"Sal. 119, 105-112: La Tua parola è lampada ai miei piedi.\nSal. 119, 113-120: Io odio i cuori doppi, ma amo la Tua legge.",bn:"গীত 119: তোমার বাক্য আমার পায়ের আলো।\nগীত 119: আমি দ্বিমুখীদের ঘৃণা করি, কিন্তু তোমার আইন ভালোবাসি।",ko:"시 119: 주님의 말씀은 내 발에 등불이옵니다.\n시 119: 저는 마음이 갈라진 자들을 미워하지만, 주님의 법을 사랑하나이다.",id:"Mz 119: Firman-Mu adalah pelita bagi kakiku.\nMz 119: Aku benci orang yang mendua hati, tetapi hukum-Mu kucintai.",tr:"Mez 119: Senin sözün ayağıma lamba.\nMez 119: İki yüreklileri nefret ederim, ama senin yasana severim.",vi:"Tv 119: Lời Ngài là đèn soi cho chân con.\nTv 119: Con ghét kẻ hai lòng, nhưng con yêu mến luật Ngài.",th:"สดด 119: พระวจนะของพระองค์เป็นโคมส่องเท้าของข้าพเจ้า\nสดด 119: ข้าพเจ้าเกลียดคนสองจิตสองใจ แต่รักธรรมบัญญัติของพระองค์",pl:"Ps 119: Słowo Twoje jest lampą dla moich stóp.\nPs 119: Obłudników nienawidzę, a Prawo Twoje miłuję.",nl:"Ps. 119, 105-112: Uw woord is een lamp voor mijn voeten.\nPs. 119, 113-120: Ik haat de wankelmoedigen, maar Uw wet bemin ik.",ro:"Ps. 119, 105-112: Cuvântul Tău este lampă picioarelor mele.\nPs. 119, 113-120: Urăsc pe cei cu inima împărțită, dar iubesc legea Ta."
    },
    none:{fr:"Ps. 119, 129-136: Tes préceptes sont admirables.\nPs. 119, 137-144: Tu es juste, Seigneur, et tes jugements sont droits.",en:"Ps. 119, 129-136: Your precepts are wonderful.\nPs. 119, 137-144: You are righteous, Lord, and Your judgments are upright.",es:"Sal. 119, 129-136: Tus preceptos son maravillosos.\nSal. 119, 137-144: Justo eres, Señor, y rectos tus juicios.",pt:"Sl. 119, 129-136: Teus preceitos são admiráveis.\nSl. 119, 137-144: Tu és justo, Senhor, e retos são teus juízos.",ar:"مز 119: فرائضك عجيبة.\nمز 119: بار أنت يا رب وأحكامك مستقيمة.",zh:"咏 119: 你的约法何等奇妙。\n咏 119: 上主，你是公义的，你的判断是正直的。",de:"Ps. 119, 129-136: Wunderbar sind Deine Weisungen.\nPs. 119, 137-144: Gerecht bist du, Herr, und deine Urteile sind richtig.",ru:"Пс. 118: Чудны Твои откровения.\nПс. 118: Праведен Ты, Господи, и суды Твои прямы.",ja:"詩 119: あなたの掾めは驚くべきものです。\n詩 119: 主よ、あなたは正しく、あなたの裁きは正しい。",hi:"भजन 119: तेरी आज्ञाएं अद्भुत हैं।\nभजन 119: हे प्रभु, तू धर्मी है और तेरे निर्णय सीधे हैं।",it:"Sal. 119, 129-136: I Tuoi precetti sono meravigliosi.\nSal. 119, 137-144: Tu sei giusto, Signore, e i Tuoi giudizi sono retti.",bn:"গীত 119: তোমার বিধান অদ্ভুত।\nগীত 119: তুমি ন্যায়সংগত, হে প্রভু, এবং তোমার বিচার সঠিক।",ko:"시 119: 당신의 규정들은 놀라우니이다.\n시 119: 주님은 의로우시고, 당신의 심판들은 올바르니이다.",id:"Mz 119: Ketetapan-Mu sungguh ajaib.\nMz 119: Engkau adil, Tuhan, dan penghakiman-Mu jujur.",tr:"Mez 119: Fermanın harikadır.\nMez 119: Adilsin Ya Rab, ve yargıların doğrudur.",vi:"Tv 119: Kỳ diệu thay, thánh ý Ngài.\nTv 119: Ngài là Đấng Công chính, lạy Chúa, án quyết của Ngài quả là thẳng ngay.",th:"สดด 119: กฎเกณฑ์ของพระองค์น่าอัศจรรย์\nสดด 119: ข้าแต่พระผู้เป็นเจ้า พระองค์ทรงชอบธรรม และคำพิพากษาของพระองค์ทรงเที่ยงตรง",pl:"Ps 119: Przedziwne są Twe nakazy.\nPs 119: Sprawiedliwy jesteś, Panie, a Twe wyroki słuszne.",nl:"Ps. 119, 129-136: Wonderbaar zijn Uw verordeningen.\nPs. 119, 137-144: Rechtvaardig bent Gij, Heer, en Uw oordelen zijn juist.",ro:"Ps. 119, 129-136: Minunate sunt rânduielile Tale.\nPs. 119, 137-144: Drept ești, Doamne, și judecățile Tale sunt drepte."
    }

  const ourFathers={fr:'Notre Père, qui es aux cieux,\nque ton nom soit sanctifié,\nque ton règne vienne,\nque ta volonté soit faite sur la terre comme au ciel.\nDonne-nous aujourd\'hui notre pain de ce jour.\nPardonne-nous nos offenses,\ncomme nous pardonnons aussi à ceux qui nous ont offensés.\nEt ne nous laisse pas entrer en tentation,\nmais délivre-nous du Mal.\nAmen.',en:'Our Father, who art in heaven,\nhallowed be Thy name;\nThy kingdom come,\nThy will be done\non earth as it is in heaven.\nGive us this day our daily bread,\nand forgive us our trespasses,\nas we forgive those who trespass against us;\nand lead us not into temptation,\nbut deliver us from evil.\nAmen.',es:'Padre nuestro, que estás en el cielo,\nsantificado sea tu Nombre;\nvenga a nosotros tu reino;\nhágase tu voluntad en la tierra como en el cielo.\nDanos hoy nuestro pan de cada día;\nperdona nuestras ofensas,\ncomo también nosotros perdonamos a los que nos ofenden;\nno nos dejes caer en la tentación,\ny líbranos del mal.\nAmén.',pt:'Pai nosso que estais nos céus,\nsantificado seja o vosso Nome;\nvenha a nós o vosso Reino;\nseja feita a vossa vontade\nassim na terra como no céu.\nO pão nosso de cada dia nos dai hoje;\nperdoai-nos as nossas ofensas,\nassim como nós perdoamos\na quem nos tem ofendido;\ne não nos deixeis cair em tentação;\nmas livrai-nos do Mal.\nAmém.',ar:'أبانا الذي في السماوات،\nليتقدس اسمك؛\nليأتِ ملكوتك؛\nلتكن مشيئتك على الأرض كما في السماء.\nأعطنا خبزنا كفاف يومنا؛\nواغفر لنا خطايانا\nكما نحن أيضا نغفر لمن أساء إلينا؛\nولا تدخلنا في التجربة،\nلكن نجنا من الشرير.\nآمين.',zh:'我们的天父，\n愿你的名受显扬，\n愿你的国来临，\n愿你的旨意奉行在人间，如同在天上。\n求你今天赏给我们日用的食粮，\n求你宽恕我们的罪过，\n如同我们宽恕别人一样，\n求你别让我们陷入诱惑，\n但救我们免于凶恶。\n阿们。',de:'Vater unser im Himmel,\ngeheiligt werde dein Name.\nDein Reich komme.\nDein Wille geschehe,\nwie im Himmel, so auf Erden.\nUnser tägliches gib uns heute.\nUnd vergib uns unsere Schuld,\nwie auch wir vergeben unseren Schuldigern.\nUnd führe uns nicht in Versuchung,\nsondern erlöse uns von dem Bösen.\nAmen.',ru:'Отче наш, Иже еси на небесех!\nДа святится имя Твое,\nда приидет Царствие Твое,\nда будет воля Твоя,\nяко на небеси и на земли.\nХлеб наш наственный даждь нам днесь;\nи остави нам долги наша,\nякоже и мы оставляем должником нашим;\nи не введи нас во искушение,\nно избави нас от лукавого.\nАминь.',ja:'天におられるわたしたちの父よ、\nみ名が聖とされますように。\nみ国が来ますように。\nみ心が天に行われるとおり、\n地にも行われますように。\nわたしたちに必要な糧を、\n今日わたしたちにお与えください。\nわたしたちの罪を償ってください、\nわたしたちも自分に負い目のある人を\n償うようにいたします。\nわたしたちを誘惑に遭わせず、\n悪い者から救い出してください。\nアーメン。',hi:'हमारा पिता जो स्वर्ग में है,\nतेरा नाम पवित्र माना जाए।\nतेरा राज्य आए।\nतेरी इच्छा स्वर्ग में पूरी होती है,\nवैसे ही पृथ्वी पर भी हो।\nहमें आज हमारा दैनिक भोजन दे।\nहमारे अपराधों को क्षमा कर,\nजैसे हम भी अपने अपराधियों को क्षमा करते हैं।\nहमें परीक्षा में मत डाल,\nबल्कि हमें बुराई से बचा।\nआमेन।',it:'Padre nostro, che sei nei cieli,\nsia santificato il Tuo nome;\nvenga il Tuo regno;\nsia fatta la Tua volontà,\ncome in cielo, così in terra.\nDacci oggi il nostro pane quotidiano,\ne rimetti a noi i nostri debiti,\ncome noi li rimettiamo ai nostri debitori,\ne non ci indurre in tentazione,\nma liberaci dal male.\nAmen.',bn:'আমাদের পিতা যিনি স্বর্গে আছো,\nতোমার নাম পবিত্র বলে পরিচিত হোক।\nতোমার রাজ্য আসুক।\nতোমার ইচ্ছা স্বর্গে হয়,\nতেমনি পৃথিবীতেও হোক।\nআমাদের প্রতিদিনের রুটি আজ আমাদিগকে দাও।\nআমাদের ঋণ ক্ষমা করো,\nযেমন আমরাও আমাদের ঋণীদের ক্ষমা করি।\nআমাদের পরীক্ষায় ফেলো না,\nকিন্তু মন্দ থেকে আমাদের উদ্ধার করো।\nআমেন।',ko:'하늘에 계신 우리 아버지,\n아버지의 이름이 거룩히 빛나시며,\n아버지의 나라가 오시며,\n아버지의 뜻이 하늘에서와 같이\n땅에서도 이루어지소서.\n오늘 우리에게 일용할 양식을 주시고,\n저희에게 잘못한 이를 저희가 용서하오니\n저희 죄를 용서하시고,\n저희를 유혹에 빠지지 않게 하시고,\n악에서 구하소서.\n아멘.',id:'Bapa kami yang di surga,\ndikuduskanlah nama-Mu;\ndatanglah kerajaan-Mu;\njadilah kehendak-Mu\ndi atas bumi seperti di dalam surga.\nBerikanlah kami pada hari ini\nmakanan kami yang secukupnya;\ndan ampunilah kesalahan kami,\nseperti kami juga mengampuni\nyang bersalah kepada kami;\ndan janganlah membawa kami\nke dalam pencobaan,\ntetapi lepaskanlah kami dari yang jahat.\nAmin.',tr:'Göklerdeki Babamız,\nadın kutsal olsun.\nKrallığın gelsin.\nGökte olduğu gibi\nyerdeki istediğin olsun.\nBugün bize günlük ekmeğimizi ver.\nBizi bağışla,\nbiz de bize borçlu olanları bağışlarız.\nBizi ayartıya sokma,\nbizi kötü olandan kurtar.\nAmin.',vi:'Lạy Cha chúng con ở trên trời,\nchúng con nguyện danh Cha cả sáng,\nnước Cha trị đến,\ný Cha thể hiện dưới đất cũng như trên trời.\nXin Cha cho chúng con hôm nay lương thực hằng ngày;\nvà tha nợ chúng con,\nnhư chúng con cũng tha\ncho những người có nợ chúng con;\nXin chớ để chúng con sa chước cám dỗ,\nnhưng cứu chúng con cho khỏi sự dữ.\nAmen.',th:'ข้าแต่พระบิดาของข้าพเจ้าทั้งหลาย\nพระนามพระองค์จงเป็นที่ศักดิ์สิทธิ์\nอาณาจักรของพระองค์จงมาถึง\nพระประสงค์ของพระองค์จงสำเร็จ\nในแผ่นดินเหมือนในสวรรค์\nโปรดประทานอาหารประจำวัน\nแก่ข้าพเจ้าทั้งหลายในวันนี้\nโปรดประทานอภัยแก่ข้าพเจ้า\nเหมือนข้าพเจ้าให้อภัยแก่ผู้อื่น\nโปรดอย่าให้ข้าพเจ้าแพ้การประลวง\nแต่โปรดช่วยให้พ้นจากความชั่วร้าย\nอาแมน',pl:'Ojcze nasz, któryś jest w niebie,\nświęć się imię Twoje;\nprzyjdź królestwo Twoje;\nbądź wola Twoja jako w niebie, tak i na ziemi.\nChleba naszego powszedniego daj nam dzisiaj;\ni odpuść nam nasze winy,\njako i my odpuszczamy naszym winowajcom;\ni nie wódź nas na pokuszenie,\nale zbaw nas od złego.\nAmen.',nl:'Onze Vader die in de hemel zijt,\nuw Naam worde geheiligd;\nuw koninkrijk kome;\nuw wil geschiede,\nop aarde zoals in de hemel.\nGeef ons heden ons dagelijks brood;\nen vergeef ons onze schulden,\ngelijk ook wij vergeven aan onze schuldenaren;\nen leid ons niet in beproeving,\nmaar verlos ons van het kwade.\nAmen.',ro:'Tatăl nostru, care ești în ceruri,\nsfințească-Se numele Tău;\nvie împărăția Ta;\nfie voia Ta,\nprecum în cer, așa și pe pământ.\nPâinea noastră cea de toate zilele\ndă-ne-o nouă astăzi;\nși ne iartă nouă păcatele noastre,\nprecum și noi iertăm greșiților noștri;\nnu ne duce pe noi în ispită,\ndar ne izbăvește de cel rău.\nAmin.'};
  const ourFather=ourFathers[cl]||ourFathers['fr'];
  document.getElementById('brv').innerHTML=`
    <h2 style="font-size:20px;font-weight:700;margin-bottom:6px">📿 ${t('brevTitle')}</h2>

        ${BRE.hours.map(h=>`<option value="${h.id}" ${h.id===curBrevHour?'selected':''}>${h.icon} ${h.name[cl]||h.name['fr']||h.id}</option>`).join('')}
      </select>
      <select id="brevDaySel" style="flex:1;min-width:150px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);font-size:13px;font-family:inherit">
        ${dn.map((d,i)=>`<option value="${i}" ${i===today?'selected':''}>${d}</option>`).join('')}
      </select>
    </div>
    <div style="background:#FAF8F4;border-radius:12px;padding:20px;margin-bottom:16px;border-left:4px solid var(--gold)">
      <div style="font-size:13px;font-weight:600;color:var(--gold);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">${t('brevOffice')}</div>
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">℣. ${o.opening}</div>
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">℟. ${o.response}</div>
      <div style="font-size:14px;color:#6B6862;font-style:italic">${o.glory}</div>
    </div>
    ${hymn?`<div style="background:#FAF8F4;border-radius:12px;padding:20px;margin-bottom:16px;border-left:4px solid #3C3489">
      <div style="font-size:13px;font-weight:600;color:#3C3489;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">${t('brevHymn')} — ${hymn.title}</div>
      <div style="font-size:14px;color:#5F5E5A;line-height:1.75;white-space:pre-line">${hymn.txt}</div>
    </div>`:''}
    <div style="background:#FAF8F4;border-radius:12px;padding:20px;margin-bottom:16px;border-left:4px solid #085041">
      <div style="font-size:13px;font-weight:600;color:#085041;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">${t('brevPsalm')}</div>
      <div style="font-size:14px;color:#5F5E5A;line-height:1.75;white-space:pre-line">${ps}</div>
    </div>
    <div style="background:#FAF8F4;border-radius:12px;padding:20px;margin-bottom:16px;border-left:4px solid #BA7517">
      <div style="font-size:13px;font-weight:600;color:#BA7517;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">${t('brevOurFather')}</div>
      <div style="font-size:14px;color:#5F5E5A;line-height:1.75;white-space:pre-line">${ourFather}</div>
    </div>
    <div style="background:#FAF8F4;border-radius:12px;padding:20px;margin-bottom:16px;border-left:4px solid #993C1D">
      <div style="font-size:13px;font-weight:600;color:#993C1D;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">${t('brevBlessing')}</div>
      <div style="font-size:14px;color:#5F5E5A;font-style:italic">℣. ${cl==='fr'?'Le Seigneur nous bénisse et nous garde de tout mal.':cl==='en'?'May the Lord bless us and keep us from all evil.':cl==='es'?'El Señor nos bendiga y nos guarde de todo mal.':cl==='pt'?'O Senhor nos abençoe e nos guarde de todo mal.':cl==='ar'?'ليباركنا الرب ويحفظنا من كل شر.':cl==='zh'?'愿上主降福我们，保护我们远离一切邪恶。':cl==='de'?'Der Herr segne uns und bewahre uns vor allem Übel.':cl==='ru'?'Благослови нас, Господи, и сохрани нас от всякого зла.':cl==='ja'?'主が私たちを祝福し、すべての悪から守られますように。':cl==='it'?'Il Signore ci benedica e ci preservi da ogni male.':cl==='hi'?'प्रभु हमें आशीर्वाद दें और हर बुराई से बचाएं।':cl==='ko'?'주님께서 우리를 축복하시고 모든 악에서 지켜주소서.':cl==='vi'?'Xin Chúa bless chúng ta và gìn giữ chúng ta khỏi mọi sự dữ.':cl==='pl'?'Niech Bóg nas błogosławi i strzeże od wszelkiego złego.':cl==='nl'?'De Heer zegene ons en beware ons voor al het kwaad.':cl==='ro'?'Domnul să ne binecuvânteze și să ne păzească de tot răul.':t('brevBlessing')}</div>
      <div style="font-size:14px;color:#5F5E5A;font-style:italic;margin-top:8px">℟. ${cl==='fr'?'Amen.':cl==='en'?'Amen.':cl==='es'?'Amén.':cl==='pt'?'Amém.':cl==='ar'?'آمين.':cl==='zh'?'阿们。':cl==='de'?'Amen.':cl==='ru'?'Аминь.':cl==='ja'?'アーメン。':cl==='it'?'Amen.':cl==='hi'?'आमेन।':cl==='ko'?'아멘.':cl==='vi'?'Amen.':cl==='pl'?'Amen.':cl==='nl'?'Amen.':cl==='ro'?'Amin.':t('brevBlessing')}</div>

el>${t('i18nSchedule')}</label><textarea id="crSch" placeholder="Ex: Dimanche 10h - Messe&#10;Mercredi 19h - Étude biblique"></textarea></div><button class="btn btn-gold" onclick="doChReg()" style="width:100%;padding:12px;font-size:14px;font-weight:600;margin-top:8px">${t('i18nSendRequest')}</button></div>`;

function doChReg(){
  const name=document.getElementById('crName').value.trim();
  const den=document.getElementById('crDen').value;
  const city=document.getElementById('crCity').value.trim();
  const errEl=document.getElementById('chRegErr');const okEl=document.getElementById('chRegOk');
  errEl.style.display='none';okEl.style.display='none';
  if(!name||!city){errEl.textContent='Le nom et la ville sont obligatoires';errEl.style.display='block';return}
  CHURCHES.push({
    name,den,city,co:document.getElementById('crCo').value.trim().toUpperCase(),
    yr:parseInt(document.getElementById('crYr').value)||null,
    adr:document.getElementById('crAdr').value.trim(),
    lat:parseFloat(document.getElementById('crLat').value)||null,
    lng:parseFloat(document.getElementById('crLng').value)||null,
    cap:parseInt(document.getElementById('crCap').value)||null,
    phone:document.getElementById('crPhone').value.trim(),
    email:document.getElementById('crEmail').value.trim(),
    website:document.getElementById('crWeb').value.trim(),
    leader:document.getElementById('crLeader').value.trim(),
    desc:document.getElementById('crDesc').value.trim(),
    sch:document.getElementById('crSch').value.trim(),
    status:'pending',date:new Date().toISOString().slice(0,10)
  });
  saveAll();okEl.style.display='block';
  setTimeout(()=>{rChReg()},4000);
}

  if(a){

function memberAvatar(m,size){
  size=size||32;
  if(m&&m.photo){return`<img src="${m.photo}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;flex-shrink:0">`}
  const initial=m?m.nom.charAt(0):'?';
  return`<div style="width:${size}px;height:${size}px;border-radius:50%;background:#1C1A17;color:#F5EDD0;display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*0.4)}px;font-weight:700;flex-shrink:0">${initial}</div>`;
}
function renderMediaGrid(mediaItems){
  if(!mediaItems||!mediaItems.length)return'';
  const count=mediaItems.length;
  let html='<div style="display:grid;gap:4px;margin-top:8px;border-radius:8px;overflow:hidden">';
  if(count===1){
    html+=`<div style="max-height:320px;overflow:hidden">${renderMediaItem(mediaItems[0])}</div>`;
  }else if(count===2){
    html+=`<div style="grid-template-columns:1fr 1fr;display:grid;gap:4px">${mediaItems.map(m=>`<div style="max-height:200px;overflow:hidden">${renderMediaItem(m)}</div>`).join('')}</div>`;
  }else{
    html+=`<div style="grid-template-columns:repeat(3,1fr);display:grid;gap:4px">${mediaItems.slice(0,6).map(m=>`<div style="max-height:140px;overflow:hidden">${renderMediaItem(m)}</div>`).join('')}</div>`;
    if(count>6)html+=`<div style="text-align:center;font-size:11px;color:var(--muted);padding:4px">+${count-6} autres</div>`;
  }
  html+='</div>';
  return html;
}
function renderMediaItem(item){
  if(item.type==='video'){
    return`<video src="" style="width:100%;max-height:320px;object-fit:cover;border-radius:8px;cursor:pointer" controls preload="metadata" data-src="${encodeURIComponent(item.data)}"></video>`;
  }
  return`<img src="" style="width:100%;max-height:320px;object-fit:cover;cursor:pointer;border-radius:8px" data-src="${encodeURIComponent(item.data)}" onclick="openMediaViewer(decodeURIComponent(this.dataset.src),'image')">`;
}
function fixupMediaGrids(){
  document.querySelectorAll('#commPosts [data-src],#acv [data-src]').forEach(el=>{el.src=decodeURIComponent(el.dataset.src)});
}
function openMediaViewer(src,type){
  const mc=document.getElementById('modalC');
  mc.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div style="max-width:90vw;max-height:90vh"><button onclick="closeModal()" style="position:fixed;top:16px;right:16px;z-index:1001;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer">✕</button>${type==='video'?`<video src="" style="max-width:90vw;max-height:90vh;object-fit:contain" controls autoplay></video>`:`<img src="" style="max-width:90vw;max-height:90vh;object-fit:contain">`}</div></div>`;
  const mediaEl=mc.querySelector(type==='video'?'video':'img');
  if(mediaEl)mediaEl.src=src;
}

let pendingPostMedia=[];
function handlePostMedia(input){
  const files=Array.from(input.files);
  if(!files.length)return;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=function(e){
      const type=file.type.startsWith('video')?'video':'image';
      const item={type,data:e.target.result,name:file.name};
      pendingPostMedia.push(item);
      renderPostMediaPreview();
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}
function renderPostMediaPreview(){
  const container=document.getElementById('postMediaPreview');
  const countEl=document.getElementById('postMediaCount');
  const clearBtn=document.getElementById('clearPostMedia');
  if(!container)return;
  if(!pendingPostMedia.length){
    container.innerHTML='';
    if(countEl)countEl.style.display='none';
    if(clearBtn)clearBtn.style.display='none';
    return;
  }
  container.innerHTML=pendingPostMedia.map((m,i)=>{
    if(m.type==='video'){
      return`<div style="position:relative"><video src="" style="width:100%;height:80px;object-fit:cover;border-radius:6px" data-src="${encodeURIComponent(m.data)}" preload="metadata"></video><button onclick="removePostMedia(${i})" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;line-height:1">✕</button></div>`;
    }
    return`<div style="position:relative"><img src="" style="width:100%;height:80px;object-fit:cover;border-radius:6px;cursor:pointer" data-src="${encodeURIComponent(m.data)}" onclick="openMediaViewer(decodeURIComponent(this.dataset.src),'image')"><button onclick="removePostMedia(${i})" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;line-height:1">✕</button></div>`;
  }).join('');
  container.querySelectorAll('video[data-src],img[data-src]').forEach(el=>{el.src=decodeURIComponent(el.dataset.src)});
  if(countEl){countEl.style.display='inline';countEl.textContent=pendingPostMedia.length+' fichier(s)'}
  if(clearBtn){clearBtn.style.display='inline'}
}
function removePostMedia(i){
  pendingPostMedia.splice(i,1);
  renderPostMediaPreview();
}
function clearPostMedia(){
  pendingPostMedia=[];
  renderPostMediaPreview();
}
function filterComm(type,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  document.querySelectorAll('.msg-card').forEach(c=>{
    if(type==='all')c.style.display='';
    else if(type==='church')c.style.display=c.dataset.type==='church'?'':'none';
    else c.style.display=c.dataset.type==='member'?'':'none';
  });
}
function addPost(){
  if(curMember&&curMember.restricted){alert('⛔ Votre compte est restreint. Vous ne pouvez pas publier d\'annonces. Raison : '+(curMember.restrictReason||'Non-respect des orientations du groupe.'));return}

}

    </tbody></table></div>`:''}
    <div class="adm-section" style="margin-bottom:16px"><h3>📊 ${t('adminReports')}</h3>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span style="font-size:13px">${t('adminReportFreq')}:</span>
      <select id="reportFreq" onchange="saveReportFreq(this.value)" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit">
        <option value="daily" ${reportFrequency==='daily'?'selected':''}>${t('adminDaily')}</option>
        <option value="weekly" ${reportFrequency==='weekly'?'selected':''}>${t('adminWeekly')}</option>
        <option value="monthly" ${reportFrequency==='monthly'?'selected':''}>${t('adminMonthly')}</option>
      </select>
      <span id="reportSaved" style="font-size:11px;color:#0F6E56;display:none">✓ ${t('i18nSaved')}</span>
    </div>
    <div style="margin-top:10px;padding:10px;background:#F5F4F0;border-radius:8px;font-size:12px;color:var(--muted)">
      ${t('adminTotalMembers')}: <b>${mc}</b> | ${t('adminActive')}: <b>${activeMembers}</b> | ${t('adminSuspended')}: <b>${suspendedMembers}</b> | ${t('i18nChurches')}: <b>${CH.length}</b> | ${t('i18nRequests')}: <b>${crc}</b> (${pending} ${t('i18nPending')})
    </div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="adm-section"><h3>📋 ${t('i18nChurches')} (${CH.length})</h3><table class="tbl"><thead><tr><th>ID</th><th>${t('i18nName')}</th><th>${t('i18nDen')}</th><th>${t('i18nCity')}</th><th style="width:120px">${t('i18nActions')}</th></tr></thead><tbody>${CH.map(c=>`<tr><td>${c.id}</td><td style="font-weight:600;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.name}</td><td><span class="tag-b" style="background:var(--surface2);color:var(--muted)">${c.den}</span></td><td>${c.city}</td><td><button class="btn btn-sm" onclick="openEdit(${c.id})">✏️</button> <button class="btn btn-sm btn-red" onclick="delCh(${c.id})">🗑️</button></td></tr>`).join('')}</tbody></table></div>
      <div class="adm-section"><h3>👥 ${t('adminManageMembers')} (${mc})</h3>${mc?`<table class="tbl"><thead><tr><th>${t('adminName')}</th><th>${t('adminEmail')}</th><th>${t('i18nPhone')}</th><th>${t('i18nChurch')}</th><th>${t('i18nStatus')}</th><th style="width:100px">${t('i18nActions')}</th></tr></thead><tbody>${MEMBERS.map((m,i)=>`<tr style="${m.restricted?'opacity:.5':''}"><td style="font-weight:600"><div style="display:flex;align-items:center;gap:6px">${memberAvatar(m,24)}${m.nom}</div></td><td style="font-size:11px">${m.email}</td><td style="font-size:11px">${m.tel||'—'}</td><td style="font-size:11px">${m.church||'—'}</td><td>${m.restricted?'<span style="color:#C0392B;font-size:11px;font-weight:600">⛔ '+t('adminSuspended')+'</span>':'<span style="color:#0F6E56;font-size:11px">✅ '+t('adminActive')+'</span>'}</td><td><button class="btn btn-sm" onclick="toggleRestrict(${i})">${m.restricted?t('adminUnsuspend'):t('adminSuspend')}</button> <button class="btn btn-sm btn-red" onclick="delMem(${i})">🗑️</button></td></tr>`).join('')}</tbody></table>`:`<p style="font-size:13px;color:var(--muted)">${t('i18nNoMembers')}</p>`}</div>
    </div>`;
}
function addAdmin(){
  if(!isSuperAdmin())return;
  const n=document.getElementById('newAdminName').value.trim();
  const e=document.getElementById('newAdminEmail').value.trim();
  const p=document.getElementById('newAdminPass').value;
  if(!n||!e||!p)return alert('Tous les champs sont obligatoires');
  if(ADMINS.find(a=>a.email===e))return alert('Cet email existe déjà');
  ADMINS.push({name:n,email:e,password:p,superAdmin:false,date:new Date().toISOString().slice(0,10)});
  saveAll();rAdm();
}
function revokeAdmin(i){
  if(!isSuperAdmin())return;
  const ad=ADMINS[i];if(ad.superAdmin)return;
  if(!confirm(`Révoquer l'administrateur "${ad.name}" ?`))return;
  ADMINS.splice(i,1);saveAll();rAdm();
}
function saveReportFreq(v){reportFrequency=v;try{localStorage.setItem('eccl_repfreq',v)}catch(e){};const el=document.getElementById('reportSaved');if(el){el.style.display='inline';setTimeout(()=>el.style.display='none',2000)}}
try{const sf=localStorage.getItem('eccl_repfreq');if(sf)reportFrequency=sf}catch(e){}
function approveCh(idx){
  const c=CHURCHES[idx];if(!c)return;
  const newCh={
    id:nextId++,name:c.name,den:c.den,city:c.city,co:c.co,rt:4.0,rv:0,cap:c.cap||500,
    yr:c.yr||2024,v:false,bg:'#1C1A17',tc:'#F5EDD0',lat:c.lat,lng:c.lng,adr:c.adr||'',
    desc:{fr:c.desc||'',en:''},sch:[],med:[],nb:[],
    leaders:c.leader?[{nom:c.leader,role:'Responsable'}]:[],
    phone:c.phone||'',email:c.email||'',website:c.website||'',
    imgExt:'',imgInt:'',history:c.desc||''
  };
  CH.push(newCh);c.status='approved';saveAll();initMap2();rl();rAdm();
}
function rejectCh(idx){CHURCHES.splice(idx,1);saveAll();rAdm()}
function churchForm(c){
  const isNew=!c;const id=c?c.id:nextId;
  const nm=c?c.name:'';const dn=c?c.den:'Catholique';const ct=c?c.city:'';const co=c?c.co:'';
  const rt=c?c.rt:4.5;const rv=c?c.rv:0;const cap=c?c.cap:500;const yr=c?c.yr:2024;
  const ad=c?c.adr:'';const df=c?c.desc.fr:'';const de=c?c.desc.en||'':'';
  const lat=c?c.lat:'';const lng=c?c.lng:'';const bg=c?c.bg:'#1C1A17';const tc=c?c.tc:'#F5EDD0';
  const v=c?c.v:true;const hist=c?c.history:'';
  const leaders=c?c.leaders:[];
  const phone=c?c.phone:'';const email=c?c.email:'';const website=c?c.website:'';
  const imgExt=c?c.imgExt:'';const imgInt=c?c.imgInt:'';
  return`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:640px"><button class="modal-close" onclick="closeModal()">✕</button><h2>${isNew?'+ Ajouter':'✏️ Modifier'} une église</h2>
    <div class="fg"><label>Nom</label><input id="eNm" value="${nm}"/></div>
    <div class="frow"><div class="fg"><label>Dénomination</label><select id="eDn">${DENOMS.map(d=>`<option ${d===dn?'selected':''}>${d}</option>`).join('')}</select></div><div class="fg"><label>Vérifié</label><select id="eV"><option value="true" ${v?'selected':''}>Oui</option><option value="false" ${!v?'selected':''}>Non</option></select></div></div>
    <div class="frow"><div class="fg"><label>Ville</label><input id="eCt" value="${ct}"/></div><div class="fg"><label>Pays (code)</label><input id="eCo" value="${co}" maxlength="2"/></div></div>
    <div class="frow"><div class="fg"><label>Latitude</label><input id="eLa" value="${lat}" type="number" step="any"/></div><div class="fg"><label>Longitude</label><input id="eLn" value="${lng}" type="number" step="any"/></div></div>
    <div class="frow"><div class="fg"><label>Adresse</label><input id="eAd" value="${ad}"/></div><div class="fg"><label>Capacité</label><input id="eCap" value="${cap}" type="number"/></div></div>
    <div class="frow"><div class="fg"><label>Fondée en</label><input id="eYr" value="${yr}" type="number"/></div><div class="fg"><label>Note (0-5)</label><input id="eRt" value="${rt}" type="number" step="0.1" min="0" max="5"/></div></div>
    <div class="fg"><label>Responsables (un par ligne : nom,rôle)</label><textarea id="eLeaders" placeholder="Pasteur Jean,Pasteur principal&#10;Pasteure Marie,Co-pasteure">${leaders.map(l=>`${l.nom},${l.role}`).join('\n')}</textarea></div>
    <div class="frow"><div class="fg"><label>Téléphone</label><input id="ePhone" value="${phone}"/></div><div class="fg"><label>Email</label><input id="eEmail" value="${email}"/></div></div>
    <div class="fg"><label>Site web</label><input id="eWeb" value="${website}"/></div>
    <div class="frow"><div class="fg"><label>Image extérieure (URL)</label><input id="eImgExt" value="${imgExt}"/></div><div class="fg"><label>Image intérieure (URL)</label><input id="eImgInt" value="${imgInt}"/></div></div>
    <div class="fg"><label>Description (FR)</label><textarea id="eDF">${df}</textarea></div>
    <div class="fg"><label>Description (EN)</label><textarea id="eDE">${de}</textarea></div>
    <div class="fg"><label>Histoire de l'église</label><textarea id="eHist" style="min-height:120px">${hist}</textarea></div>
    <div class="frow"><div class="fg"><label>Couleur fond</label><input id="eBg" value="${bg}" type="color" style="height:38px;padding:3px"/></div><div class="fg"><label>Couleur texte</label><input id="eTc" value="${tc}" type="color" style="height:38px;padding:3px"/></div></div>
    <button class="btn btn-gold" onclick="saveChurch(${id},${isNew})" style="margin-top:8px">${isNew?'Ajouter':'Enregistrer'}</button>
  </div></div>`;
}
function openAdd(){document.getElementById('modalC').innerHTML=churchForm(null);setTimeout(()=>document.getElementById('eNm').focus(),100)}
function openEdit(id){const c=CH.find(x=>x.id===id);if(!c)return;document.getElementById('modalC').innerHTML=churchForm(c)}
function saveChurch(id,isNew){
  const nm=document.getElementById('eNm').value.trim();if(!nm)return alert('Le nom est obligatoire');
  const leadersText=document.getElementById('eLeaders').value.trim();
  const leaders=leadersText?leadersText.split('\n').filter(l=>l.trim()).map(l=>{const parts=l.split(',');return{nom:parts[0]?.trim()||'',role:parts[1]?.trim()||'Responsable'}}):[];
  const obj={id,name:nm,den:document.getElementById('eDn').value,city:document.getElementById('eCt').value.trim(),co:document.getElementById('eCo').value.trim().toUpperCase(),rt:parseFloat(document.getElementById('eRt').value)||4.5,rv:0,cap:parseInt(document.getElementById('eCap').value)||500,yr:parseInt(document.getElementById('eYr').value)||2024,v:document.getElementById('eV').value==='true',bg:document.getElementById('eBg').value,tc:document.getElementById('eTc').value,lat:parseFloat(document.getElementById('eLa').value)||null,lng:parseFloat(document.getElementById('eLn').value)||null,adr:document.getElementById('eAd').value.trim(),desc:{fr:document.getElementById('eDF').value.trim(),en:document.getElementById('eDE').value.trim()},history:document.getElementById('eHist').value.trim(),phone:document.getElementById('ePhone').value.trim(),email:document.getElementById('eEmail').value.trim(),website:document.getElementById('eWeb').value.trim(),imgExt:document.getElementById('eImgExt').value.trim(),imgInt:document.getElementById('eImgInt').value.trim(),leaders,med:[],nb:[],sch:[]};
  if(isNew){obj.id=nextId++;CH.push(obj)}
  else{const idx=CH.findIndex(x=>x.id===id);if(idx>=0){obj.rv=CH[idx].rv;obj.sch=CH[idx].sch;obj.med=CH[idx].med;obj.nb=CH[idx].nb;CH[idx]=obj}}
  saveAll();closeModal();rl();initMap2();if(!isNew&&sid===id)sd(id);rAdm();
}
function delCh(id){const c=CH.find(x=>x.id===id);if(!c)return;if(!confirm(`Supprimer "${c.name}" ?`))return;CH=CH.filter(x=>x.id!==id);saveAll();rl();initMap2();rAdm();if(sid===id)closedet()}
function delMem(i){const reason=prompt('Raison de la suppression (optionnel) :');if(!confirm(`Supprimer le membre "${MEMBERS[i].nom}" ?`))return;MEMBERS.splice(i,1);saveAll();rAdm()}
function toggleRestrict(i){const m=MEMBERS[i];if(!m)return;const action=m.restricted?'réactiver':'restreindre';if(!confirm(`${action} le membre "${m.nom}" ?`))return;MEMBERS[i].restricted=!MEMBERS[i].restricted;MEMBERS[i].restrictReason=MEMBERS[i].restricted?'Non-respect des orientations du groupe':'';if(MEMBERS[i].restricted&&curMember&&curMember.email===m.email){curMember=null;localStorage.removeItem('eccl_session');updateAccountNav();sv('login')}saveAll();rAdm()}
try{initMap()}catch(e){}
buildNav();
rl();ufc();updateAccountNav();applyTranslations();
document.getElementById('sinput').placeholder=t('searchPlaceholder');
if(curMember){sv('account')}else{sv('welcome')}
</script>
</body>
</html>
